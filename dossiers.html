<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCIPNET - DOSSIERS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="departments.js"></script>
    <script src="alert.js"></script>
    <script src="toast.js"></script>
    <script src="notifications.js"></script>
    <script src="modal.js"></script>
    <script src="nav.js"></script>
    <script src="dossiers.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>
    <div class="identity-block">
        <a href="dashboard.html" style="text-decoration:none;"><div class="logo">SCIPNET<span>SECURE INTRANET // SITE-19</span></div></a>
    </div>
    <nav class="main-nav" id="main-nav"></nav>

    <div class="page-content page-wrapper fade-in">
        <div class="page-title">DOSSIERS</div>
        <div class="page-subtitle">DOSSIERS STORAGE FOR SCIENTIFIC DEPARTMENT CONTAINMENT RECORDS</div>
        <div id="access-summary" style="margin-bottom:18px; color:var(--text-dim);"></div>
        <div id="dossier-cl4-warning" class="alert-section" style="display:none;margin-bottom:18px; padding:12px; border:1px solid rgba(255,62,62,0.25); background:rgba(255,62,62,0.06);">
            UNAUTHORIZED_FOR_DOCUMENT_APPROVAL: CL4+ REQUIRED FOR APPROVAL, EDITS, AND LOG MODIFICATION.
        </div>

        <div class="section-header">DOSSIERS LIST</div>
        <div class="section-block" style="margin-bottom:20px; display:grid; gap:14px;">
            <div style="display:flex; flex-wrap:wrap; gap:12px; align-items:center;">
                <input id="dossier-search" type="text" placeholder="SEARCH DOSSIERS..." oninput="renderDossierList()" style="flex:1; min-width:220px;">
                <select id="filter-status" onchange="renderDossierList()" style="min-width:170px;">
                    <option value="">ALL STATUSES</option>
                    <option value="Pending Approval">Pending Approval</option>
                    <option value="Approved">Approved</option>
                </select>
                <select id="filter-class" onchange="renderDossierList()" style="min-width:170px;">
                    <option value="">ALL CLASSES</option>
                    <option value="Safe">Safe</option>
                    <option value="Euclid">Euclid</option>
                    <option value="Keter">Keter</option>
                    <option value="Apollyon">Apollyon</option>
                </select>
                <select id="filter-clearance" onchange="renderDossierList()" style="min-width:170px;">
                    <option value="">ALL CLEARANCES</option>
                    <option value="0">CL0+</option>
                    <option value="1">CL1+</option>
                    <option value="2">CL2+</option>
                    <option value="3">CL3+</option>
                    <option value="4">CL4+</option>
                    <option value="5">CL5+</option>
                    <option value="6">CL6+</option>
                    <option value="7">CL7+</option>
                    <option value="8">CL8+</option>
                </select>
                <button class="btn-full" onclick="toggleNewDossierSection()">NEW DOSSIER</button>
            </div>
        </div>

        <div id="dossier-list" class="section-block" style="margin-bottom:20px; display:grid; gap:14px;"></div>

        <div id="new-dossier-section" class="section-block" style="display:none; margin-bottom:20px;">
            <div class="section-header">NEW DOSSIER</div>
            <div style="max-width:860px; display:grid; gap:12px;">
                <label>DOSSIER DESIGNATION</label>
                <input type="text" id="dossier-designation" placeholder="ENTER DOSSIER-XXX...">

                <label>OBJECT CLASS</label>
                <select id="dossier-object-class"></select>

                <label>CLEARANCE LEVEL</label>
                <select id="dossier-clearance-level"></select>

                <label>AUTHOR</label>
                <input type="text" id="dossier-author" readonly>

                <label>DESCRIPTION</label>
                <textarea id="dossier-description" rows="4" placeholder="PHYSICAL TRAITS, BEHAVIOR, ANOMALOUS EFFECTS..."></textarea>

                <label>SPECIAL CONTAINMENT PROCEDURES</label>
                <textarea id="dossier-containment" rows="4" placeholder="CONTAINMENT METHOD, ENVIRONMENT, REQUIRED PERSONNEL..."></textarea>

                <label>RECONTAINMENT PROCEDURES</label>
                <textarea id="dossier-recontainment" rows="4" placeholder="BREACH RESPONSE STEPS..."></textarea>

                <div class="btn-row" style="margin-top:10px; gap:12px;">
                    <button class="btn-full" onclick="createDossierEntry()">CREATE DOSSIER ENTRY</button>
                    <button class="btn" onclick="toggleNewDossierSection()">CANCEL</button>
                </div>
            </div>
        </div>

        <div id="document-summary" class="section-block" style="margin-bottom:20px; display:none;"></div>

        <div id="edit-document-section" class="section-block" style="display:none; margin-bottom:20px;">
            <div class="section-header">EDIT DOSSIER</div>
            <label>OBJECT CLASS</label>
            <select id="edit-object-class"></select>
            <label>CLEARANCE LEVEL</label>
            <select id="edit-clearance-level"></select>
            <label>DESCRIPTION</label>
            <textarea id="edit-description" rows="4"></textarea>
            <label>CONTAINMENT PROCEDURES</label>
            <textarea id="edit-containment" rows="4"></textarea>
            <label>RECONTAINMENT PROCEDURES</label>
            <textarea id="edit-recontainment" rows="4"></textarea>
            <div class="btn-row" style="margin-top:10px; gap:12px;">
                <button class="btn-full" onclick="saveDocumentEdit()">SAVE CHANGES</button>
                <button class="btn" onclick="closeEditSection()">CANCEL</button>
            </div>
        </div>

        <div id="test-log-section" class="section-block" style="display:none; margin-bottom:20px;">
            <div class="section-header">TESTING LOGS</div>
            <label>TEST PERSONNEL</label>
            <input type="text" id="test-personnel" placeholder="Comma-separated personnel..."></input>
            <label>PROCEDURE</label>
            <textarea id="test-procedure" rows="3"></textarea>
            <label>RESULT</label>
            <textarea id="test-result" rows="3"></textarea>
            <div class="btn-row" style="margin-top:10px; gap:12px;">
                <button class="btn-full" onclick="saveTestLog()">ADD TEST LOG</button>
                <button id="clear-test-edit" class="btn" style="display:none;" onclick="resetTestLogForm()">CLEAR EDIT</button>
            </div>
            <div id="test-log-list" style="margin-top:16px;"></div>
        </div>

        <div id="incident-section" class="section-block" style="display:none; margin-bottom:32px;">
            <div class="section-header">INCIDENT REPORTS</div>
            <label>DATE</label>
            <input type="date" id="incident-date">
            <label>INVOLVED UNITS</label>
            <input type="text" id="incident-units" placeholder="MTF, SD, ScD..."></input>
            <label>CAUSE</label>
            <textarea id="incident-cause" rows="2"></textarea>
            <label>RESOLUTION</label>
            <textarea id="incident-resolution" rows="2"></textarea>
            <label>PREVENTION NOTES</label>
            <textarea id="incident-prevention" rows="2"></textarea>
            <div class="btn-row" style="margin-top:10px; gap:12px;">
                <button class="btn-full" onclick="saveIncidentReport()">ADD INCIDENT REPORT</button>
                <button id="clear-incident-edit" class="btn" style="display:none;" onclick="resetIncidentForm()">CLEAR EDIT</button>
            </div>
            <div id="incident-list" style="margin-top:16px;"></div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'dossiers_storage';
        let currentProfile = null;
        let currentRoles = [];
        let activeRole = null;
        let repository = null;
        let selectedDesignation = null;
        let editingTestLogId = null;
        let editingIncidentId = null;

        function getActiveScDUser() {
            return new DOSSIERS.ScDUser({
                name: activeRole.name,
                clearanceLevel: activeRole.clearance,
                department: activeRole.department
            });
        }

        function showMessage(text, type = 'info') {
            toast(text, type === 'error' ? 'error' : 'success');
        }

        function saveRepository() {
            repository.saveToLocalStorage(STORAGE_KEY);
            saveRepositorySupabase();
        }

        async function saveRepositorySupabase() {
            if (typeof _supabase === 'undefined') return;
            try {
                await repository.saveToSupabase();
            } catch (error) {
                const message = (error && (error.message || error.details || error.msg || JSON.stringify(error))) || 'Unknown Supabase error';
                console.warn('Failed to sync DOSSIERS to Supabase:', error);
                toast(`WARNING: DOSSIERS SAVE NOT SYNCED TO SERVER — ${message}`, 'warning');
            }
        }

        function renderObjectClassOptions(selectId, selectedValue) {
            const select = document.getElementById(selectId);
            select.innerHTML = DOSSIERS.OBJECT_CLASSES.map(cls => `<option value="${cls}"${cls === selectedValue ? ' selected' : ''}>${cls}</option>`).join('');
        }

        function getDossierFilterValues() {
            const search = document.getElementById('dossier-search').value.trim().toLowerCase();
            const status = document.getElementById('filter-status').value;
            const objectClass = document.getElementById('filter-class').value;
            const minClearance = document.getElementById('filter-clearance').value;
            return {
                search,
                status,
                objectClass,
                minClearance: minClearance === '' ? null : parseInt(minClearance, 10)
            };
        }

        function matchesDossierFilters(dossier, filters) {
            if (filters.status && dossier.status !== filters.status) return false;
            if (filters.objectClass && dossier.objectClass !== filters.objectClass) return false;
            if (filters.minClearance !== null && dossier.clearanceLevel < filters.minClearance) return false;
            if (!filters.search) return true;
            return [dossier.designation, dossier.author, dossier.objectClass, dossier.description].some(field =>
                field && field.toLowerCase().includes(filters.search)
            );
        }

        function renderDossierList() {
            const container = document.getElementById('dossier-list');
            const filters = getDossierFilterValues();
            const documents = repository.listDocuments().filter(doc => matchesDossierFilters(doc, filters));
            if (!documents.length) {
                container.innerHTML = '<div style="color:var(--text-dim);">No dossiers match the current search and filters.</div>';
                return;
            }
            container.innerHTML = documents.map(doc => {
                const active = selectedDesignation === doc.designation;
                const canApprove = activeRole.clearance >= 4 && doc.status !== DOSSIERS.DOSSIER_STATUSES.APPROVED;
                const canEdit = activeRole.clearance >= 4;
                const labelStyle = active ? 'background:rgba(0,255,65,0.06);border-color:rgba(0,255,65,0.25);' : '';
                return `
                    <div style="border:1px solid rgba(255,255,255,0.08); padding:18px; border-radius:12px; display:grid; gap:10px; ${labelStyle}">
                        <div style="display:flex; justify-content:space-between; flex-wrap:wrap; gap:12px; align-items:flex-start;">
                            <div style="min-width:220px;">
                                <div style="font-weight:700;">${doc.designation} — ${doc.objectClass} — CL${doc.clearanceLevel}</div>
                                <div style="color:var(--text-dim); margin-top:4px;">${doc.status} — AUTHOR: ${doc.author}</div>
                            </div>
                            <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end;">
                                <button class="btn" onclick="selectDocument('${doc.designation}')">VIEW</button>
                                <button class="btn" ${canApprove ? '' : 'disabled'} onclick="approveSelectedDocument('${doc.designation}')">APPROVE</button>
                                <button class="btn" ${canEdit ? '' : 'disabled'} onclick="openEditDossier('${doc.designation}')">EDIT</button>
                                <button class="btn" onclick="prepareTestLog('${doc.designation}')">TESTS</button>
                                <button class="btn" onclick="prepareIncidentReport('${doc.designation}')">INCIDENTS</button>
                            </div>
                        </div>
                        <div style="color:var(--text-dim);">${doc.description ? doc.description.substring(0, 180) : 'No description available.'}</div>
                    </div>
                `;
            }).join('');
        }

        function toggleNewDossierSection() {
            const section = document.getElementById('new-dossier-section');
            const isVisible = section.style.display === 'block';
            section.style.display = isVisible ? 'none' : 'block';
            if (!isVisible) {
                document.getElementById('dossier-designation').focus();
            }
        }

        function renderSelectedDocument() {
            if (!selectedDesignation) {
                document.getElementById('document-summary').style.display = 'none';
                return;
            }
            const dossier = repository.getDocument(selectedDesignation);
            const summary = dossier.summary();
            const canApprove = activeRole.clearance >= 4 && dossier.status !== DOSSIERS.DOSSIER_STATUSES.APPROVED;
            const canEdit = activeRole.clearance >= 4;

            document.getElementById('approve-button').disabled = !canApprove;
            document.getElementById('edit-button').disabled = !canEdit;
            document.getElementById('document-summary').style.display = 'block';

            document.getElementById('document-summary').innerHTML = `
                <div style="display:grid;gap:10px;">
                    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
                        <button id="approve-button" class="btn" onclick="approveSelectedDocument('${summary.designation}')">APPROVE</button>
                        <button id="edit-button" class="btn" onclick="openEditDossier('${summary.designation}')">EDIT</button>
                    </div>
                    <div><strong>Designation:</strong> ${summary.designation}</div>
                    <div><strong>Object Class:</strong> ${summary.objectClass}</div>
                    <div><strong>Clearance:</strong> CL${summary.clearanceLevel}</div>
                    <div><strong>Status:</strong> ${summary.status} ${summary.official ? '(OFFICIAL)' : '(UNOFFICIAL)'}</div>
                    <div><strong>Author:</strong> ${summary.author}</div>
                    <div><strong>Description:</strong> ${summary.description || 'N/A'}</div>
                    <div><strong>Containment Procedures:</strong> ${summary.containmentProcedures || 'N/A'}</div>
                    <div><strong>Recontainment Procedures:</strong> ${summary.recontainmentProcedures || 'N/A'}</div>
                    <div><strong>Test Logs:</strong> ${summary.testLogCount}</div>
                    <div><strong>Incident Reports:</strong> ${summary.incidentReportCount}</div>
                </div>
            `;

            renderTestLogList(dossier);
            renderIncidentList(dossier);
        }

        function selectDocument(designation) {
            if (!designation) return;
            selectedDesignation = designation;
            resetEditState();
            renderSelectedDocument();
            renderDossierList();
            document.getElementById('document-summary').style.display = 'block';
        }

        function resetEditState() {
            editingTestLogId = null;
            editingIncidentId = null;
            document.getElementById('clear-test-edit').style.display = 'none';
            document.getElementById('clear-incident-edit').style.display = 'none';
            document.getElementById('test-personnel').value = '';
            document.getElementById('test-procedure').value = '';
            document.getElementById('test-result').value = '';
            document.getElementById('incident-date').value = '';
            document.getElementById('incident-units').value = '';
            document.getElementById('incident-cause').value = '';
            document.getElementById('incident-resolution').value = '';
            document.getElementById('incident-prevention').value = '';
            document.getElementById('edit-document-section').style.display = 'none';
        }

        function resetTestLogForm() {
            editingTestLogId = null;
            document.getElementById('clear-test-edit').style.display = 'none';
            document.getElementById('test-personnel').value = '';
            document.getElementById('test-procedure').value = '';
            document.getElementById('test-result').value = '';
        }

        function resetIncidentForm() {
            editingIncidentId = null;
            document.getElementById('clear-incident-edit').style.display = 'none';
            document.getElementById('incident-date').value = '';
            document.getElementById('incident-units').value = '';
            document.getElementById('incident-cause').value = '';
            document.getElementById('incident-resolution').value = '';
            document.getElementById('incident-prevention').value = '';
        }

        function createDossierEntry() {
            const designation = document.getElementById('dossier-designation').value.trim();
            const objectClass = document.getElementById('dossier-object-class').value;
            const clearanceLevel = parseInt(document.getElementById('dossier-clearance-level').value, 10);
            const description = document.getElementById('dossier-description').value.trim();
            const containmentProcedures = document.getElementById('dossier-containment').value.trim();
            const recontainmentProcedures = document.getElementById('dossier-recontainment').value.trim();

            if (!designation || !objectClass || isNaN(clearanceLevel)) {
                showMessage('DATA_MISSING: Please complete designation, object class, and clearance.', 'error');
                return;
            }

            try {
                repository.createDocument(getActiveScDUser(), {
                    designation,
                    objectClass,
                    clearanceLevel,
                    author: activeRole.name,
                    ownerId: currentProfile?.id || null,
                    createdBy: activeRole.name,
                    updatedBy: activeRole.name,
                    description,
                    containmentProcedures,
                    recontainmentProcedures
                });
                saveRepository();
                selectedDesignation = designation;
                renderDossierList();
                renderSelectedDocument();
                document.getElementById('new-dossier-section').style.display = 'none';
                showMessage('DOSSIER_ENTRY_CREATED: Draft saved as Pending Approval.');
                document.getElementById('dossier-designation').value = '';
                document.getElementById('dossier-description').value = '';
                document.getElementById('dossier-containment').value = '';
                document.getElementById('dossier-recontainment').value = '';
            } catch (error) {
                showMessage(error.message, 'error');
            }
        }

        function approveSelectedDocument(designation) {
            if (designation) selectDocument(designation);
            try {
                repository.approveDocument(getActiveScDUser(), selectedDesignation);
                saveRepository();
                renderSelectedDocument();
                renderDossierList();
                showMessage('DOSSIER_ENTRY_APPROVED: Document is now official.');
            } catch (error) {
                showMessage(error.message, 'error');
            }
        }

        function openEditDossier(designation) {
            if (designation) selectDocument(designation);
            const dossier = repository.getDocument(selectedDesignation);
            document.getElementById('edit-document-section').style.display = 'block';
            document.getElementById('test-log-section').style.display = 'none';
            document.getElementById('incident-section').style.display = 'none';
            renderObjectClassOptions('edit-object-class', dossier.objectClass);
            populateClearanceSelect('edit-clearance-level', dossier.clearanceLevel, activeRole.clearance);
            document.getElementById('edit-description').value = dossier.description;
            document.getElementById('edit-containment').value = dossier.containmentProcedures;
            document.getElementById('edit-recontainment').value = dossier.recontainmentProcedures;
        }

        function prepareTestLog(designation) {
            if (designation) selectDocument(designation);
            document.getElementById('test-log-section').style.display = 'block';
            document.getElementById('incident-section').style.display = 'none';
            document.getElementById('edit-document-section').style.display = 'none';
            resetTestLogForm();
            renderSelectedDocument();
            document.getElementById('test-personnel').focus();
        }

        function prepareIncidentReport(designation) {
            if (designation) selectDocument(designation);
            document.getElementById('incident-section').style.display = 'block';
            document.getElementById('test-log-section').style.display = 'none';
            document.getElementById('edit-document-section').style.display = 'none';
            resetIncidentForm();
            renderSelectedDocument();
            document.getElementById('incident-date').focus();
        }

        function closeEditSection() {
            document.getElementById('edit-document-section').style.display = 'none';
        }

        function saveDocumentEdit() {
            const updates = {
                objectClass: document.getElementById('edit-object-class').value,
                clearanceLevel: parseInt(document.getElementById('edit-clearance-level').value, 10),
                description: document.getElementById('edit-description').value.trim(),
                containmentProcedures: document.getElementById('edit-containment').value.trim(),
                recontainmentProcedures: document.getElementById('edit-recontainment').value.trim()
            };
            try {
                repository.editDocument(getActiveScDUser(), selectedDesignation, updates);
                saveRepository();
                renderSelectedDocument();
                closeEditSection();
                showMessage('DOSSIER_DOCUMENT_UPDATED: Changes recorded.');
            } catch (error) {
                showMessage(error.message, 'error');
            }
        }

        function saveTestLog() {
            const personnel = document.getElementById('test-personnel').value.split(',').map(p => p.trim()).filter(Boolean);
            const procedure = document.getElementById('test-procedure').value.trim();
            const result = document.getElementById('test-result').value.trim();

            if (!personnel.length || !procedure || !result) {
                showMessage('DATA_MISSING: Complete all test log fields.', 'error');
                return;
            }

            try {
                if (editingTestLogId) {
                    repository.updateTestLog(getActiveScDUser(), selectedDesignation, editingTestLogId, { personnel, procedure, result });
                    showMessage('TEST_LOG_UPDATED.');
                } else {
                    repository.addTestLog(getActiveScDUser(), selectedDesignation, { personnel, procedure, result });
                    showMessage('TEST_LOG_CREATED.');
                }
                saveRepository();
                resetTestLogForm();
                renderSelectedDocument();
            } catch (error) {
                showMessage(error.message, 'error');
            }
        }

        function editTestLog(testId) {
            const dossier = repository.getDocument(selectedDesignation);
            const entry = dossier.testLogs.find(log => log.testId === testId);
            if (!entry) return;
            editingTestLogId = entry.testId;
            document.getElementById('test-personnel').value = entry.personnel.join(', ');
            document.getElementById('test-procedure').value = entry.procedure;
            document.getElementById('test-result').value = entry.result;
            document.getElementById('clear-test-edit').style.display = 'inline-block';
        }

        function deleteTestLog(testId) {
            try {
                repository.deleteTestLog(getActiveScDUser(), selectedDesignation, testId);
                saveRepository();
                renderSelectedDocument();
                showMessage('TEST_LOG_DELETED.');
            } catch (error) {
                showMessage(error.message, 'error');
            }
        }

        function saveIncidentReport() {
            const date = document.getElementById('incident-date').value;
            const units = document.getElementById('incident-units').value.split(',').map(u => u.trim()).filter(Boolean);
            const cause = document.getElementById('incident-cause').value.trim();
            const resolution = document.getElementById('incident-resolution').value.trim();
            const preventionNotes = document.getElementById('incident-prevention').value.trim();

            if (!date || !units.length || !cause || !resolution || !preventionNotes) {
                showMessage('DATA_MISSING: Complete all incident report fields.', 'error');
                return;
            }

            try {
                if (editingIncidentId) {
                    repository.updateIncidentReport(getActiveScDUser(), selectedDesignation, editingIncidentId, {
                        date, units, cause, resolution, preventionNotes
                    });
                    showMessage('INCIDENT_REPORT_UPDATED.');
                } else {
                    repository.addIncidentReport(getActiveScDUser(), selectedDesignation, {
                        date, units, cause, resolution, preventionNotes
                    });
                    showMessage('INCIDENT_REPORT_CREATED.');
                }
                saveRepository();
                resetIncidentForm();
                renderSelectedDocument();
            } catch (error) {
                showMessage(error.message, 'error');
            }
        }

        function editIncidentReport(reportId) {
            const dossier = repository.getDocument(selectedDesignation);
            const entry = dossier.incidentReports.find(report => report.reportId === reportId);
            if (!entry) return;
            editingIncidentId = entry.reportId;
            document.getElementById('incident-date').value = entry.date;
            document.getElementById('incident-units').value = entry.units.join(', ');
            document.getElementById('incident-cause').value = entry.cause;
            document.getElementById('incident-resolution').value = entry.resolution;
            document.getElementById('incident-prevention').value = entry.preventionNotes;
            document.getElementById('clear-incident-edit').style.display = 'inline-block';
        }

        function deleteIncidentReport(reportId) {
            try {
                repository.deleteIncidentReport(getActiveScDUser(), selectedDesignation, reportId);
                saveRepository();
                renderSelectedDocument();
                showMessage('INCIDENT_REPORT_DELETED.');
            } catch (error) {
                showMessage(error.message, 'error');
            }
        }

        function renderTestLogList(dossier) {
            const container = document.getElementById('test-log-list');
            if (!dossier.testLogs.length) {
                container.innerHTML = '<div style="color:var(--text-dim);">No test logs yet.</div>';
                return;
            }
            const isEditAllowed = activeRole.clearance >= 4;
            container.innerHTML = dossier.testLogs.map(log => {
                const controls = isEditAllowed ?
                    `<button class="btn" onclick="editTestLog('${log.testId}')">EDIT</button> <button class="btn" onclick="deleteTestLog('${log.testId}')">DELETE</button>` : '';
                return `<div style="border:1px solid rgba(255,255,255,0.08); padding:12px; margin-bottom:10px; border-radius:8px;">
                    <strong>${log.testId}</strong> — <span>${log.personnel.join(', ')}</span>
                    <div style="margin-top:6px;"><strong>Procedure:</strong> ${log.procedure}</div>
                    <div style="margin-top:6px;"><strong>Result:</strong> ${log.result}</div>
                    <div style="margin-top:8px; display:flex; gap:8px;">${controls}</div>
                </div>`;
            }).join('');
        }

        function renderIncidentList(dossier) {
            const container = document.getElementById('incident-list');
            if (!dossier.incidentReports.length) {
                container.innerHTML = '<div style="color:var(--text-dim);">No incident reports yet.</div>';
                return;
            }
            const isEditAllowed = activeRole.clearance >= 4;
            container.innerHTML = dossier.incidentReports.map(report => {
                const controls = isEditAllowed ?
                    `<button class="btn" onclick="editIncidentReport('${report.reportId}')">EDIT</button> <button class="btn" onclick="deleteIncidentReport('${report.reportId}')">DELETE</button>` : '';
                return `<div style="border:1px solid rgba(255,255,255,0.08); padding:12px; margin-bottom:10px; border-radius:8px;">
                    <strong>${report.reportId}</strong> — <span>${report.date}</span>
                    <div style="margin-top:6px;"><strong>Units:</strong> ${report.units.join(', ')}</div>
                    <div style="margin-top:6px;"><strong>Cause:</strong> ${report.cause}</div>
                    <div style="margin-top:6px;"><strong>Resolution:</strong> ${report.resolution}</div>
                    <div style="margin-top:6px;"><strong>Prevention Notes:</strong> ${report.preventionNotes}</div>
                    <div style="margin-top:8px; display:flex; gap:8px;">${controls}</div>
                </div>`;
            }).join('');
        }

        async function initializeDossiersPage() {
            const auth = await requireAuth();
            if (!auth) return;
            currentProfile = auth.profile;
            currentRoles = await fetchMyRoles();
            activeRole = getActiveRole(currentProfile, currentRoles);
            if (activeRole.department !== 'ScD') {
                toast('ACCESS_DENIED: ONLY ScD OR O5 PERSONNEL MAY ACCESS DOSSIERS', 'error');
                setTimeout(() => window.location.href = 'dashboard.html', 1200);
                return;
            }

            document.getElementById('access-summary').innerHTML = `SIGNED IN AS <strong>${activeRole.name}</strong> — ${activeRole.department} — CL${activeRole.clearance}`;
            document.getElementById('dossier-author').value = activeRole.name;
            if (activeRole.clearance < 4) {
                document.getElementById('dossier-cl4-warning').style.display = 'block';
            }

            renderObjectClassOptions('dossier-object-class', DOSSIERS.OBJECT_CLASSES[0]);
            renderObjectClassOptions('edit-object-class', DOSSIERS.OBJECT_CLASSES[0]);
            populateClearanceSelect('dossier-clearance-level', activeRole.clearance, activeRole.clearance);
            populateClearanceSelect('edit-clearance-level', activeRole.clearance, activeRole.clearance);

            let loaded = false;
            if (typeof _supabase !== 'undefined') {
                try {
                    repository = await DOSSIERS.DossierRepository.loadFromSupabase();
                    loaded = true;
                } catch (error) {
                    console.warn('Failed to load DOSSIERS from Supabase:', error);
                }
            }

            if (!loaded) {
                repository = DOSSIERS.DossierRepository.loadFromLocalStorage(STORAGE_KEY);
                if (repository.listDocuments().length === 0) {
                    repository = DOSSIERS.createExampleRepository();
                    saveRepository();
                }
            }

            document.getElementById('document-summary').style.display = 'none';
            document.getElementById('edit-document-section').style.display = 'none';
            document.getElementById('test-log-section').style.display = 'none';
            document.getElementById('incident-section').style.display = 'none';
            document.getElementById('new-dossier-section').style.display = 'none';
            renderDossierList();
        }

        window.onload = initializeDossiersPage;
    </script>
</body>
</html>
