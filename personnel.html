<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SCiPNET - Personnel Directory</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="alert.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>FOUNDATION_PERSONNEL_DIRECTORY</h1>
    <nav>
        <a href="dashboard.html">DASHBOARD</a> |
        <a href="archive.html">ARCHIVE</a>
    </nav>

    <div style="margin: 10px 0; font-size: 0.9rem;" id="access-notice"></div>

    <div class="search-container" style="margin: 20px 0;">
        <label>SEARCH_DATABASE:</label>
        <input type="text" id="personnelSearch" placeholder="ENTER NAME, CLEARANCE OR DEPARTMENT..." onkeyup="filterPersonnel()">
    </div>

    <div id="personnel-list">
        <p>RETRIEVING_STAFF_MANIFEST...</p>
    </div>

    <script>
        let allStaff = [];

        async function loadPersonnel() {
            const auth = await requireAuth();
            if (!auth) return;

            const { profile } = auth;
            const isElevated = profile.is_admin || profile.is_overseer || profile.is_terminal_admin;

            const notice = document.getElementById('access-notice');
            if (!isElevated) {
                notice.innerText = `[NOTICE] DISPLAYING PERSONNEL AT OR BELOW CLEARANCE LEVEL ${profile.clearance_level}`;
                notice.style.color = 'var(--alert-gold)';
            } else {
                notice.innerText = `[ELEVATED ACCESS] DISPLAYING ALL FOUNDATION PERSONNEL`;
                notice.style.color = 'var(--terminal-green)';
            }

            const { data: staff, error } = await _supabase
                .from('profiles')
                .select('full_name, clearance_level, department, bio')
                .order('clearance_level', { ascending: false });

            if (error) {
                document.getElementById('personnel-list').innerHTML = "<p>ERROR: DATABASE_ACCESS_DENIED</p>";
                return;
            }

            allStaff = staff;
            renderList(allStaff);
        }

        function renderList(list) {
            const listDiv = document.getElementById('personnel-list');

            if (list.length === 0) {
                listDiv.innerHTML = "<p>NO_MATCHING_PERSONNEL_FOUND</p>";
                return;
            }

            listDiv.innerHTML = list.map(person => `
                <div class="scp-card">
                    <h3>${person.full_name}</h3>
                    <p>CLEARANCE_LEVEL: ${person.clearance_level} // DEPT: [${person.department || 'UNASSIGNED'}]</p>
                    <p><small>${person.bio || "NO_BIO_ON_RECORD"}</small></p>
                </div>`
            ).join('');
        }

        function filterPersonnel() {
            const query = document.getElementById('personnelSearch').value.toLowerCase();
            const filtered = allStaff.filter(p =>
                p.full_name.toLowerCase().includes(query) ||
                p.clearance_level.toString().includes(query) ||
                (p.department && p.department.toLowerCase().includes(query))
            );
            renderList(filtered);
        }

        window.onload = loadPersonnel;
    </script>
</body>
</html>
