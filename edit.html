<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCiPNET - Edit Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="alert.js"></script>
    <script src="toast.js"></script>
    <script src="notifications.js"></script>
    <script src="modal.js"></script>
    <script src="nav.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>
    <div class="identity-block">
        <a href="dashboard.html" style="text-decoration:none;"><div class="logo">SCIPNET<span>SECURE INTRANET // SITE-19</span></div></a>
    </div>
    <nav class="main-nav" id="main-nav"></nav>

    <div class="page-content page-wrapper fade-in">
        <div class="page-title" id="form-header">LOADING_DOCUMENT...</div>
        <div class="page-subtitle">DOCUMENT EDITOR // AUTHORIZED PERSONNEL ONLY</div>
        <div style="max-width:800px;">
            <label>DOCUMENT TITLE</label>
            <input type="text" id="title" placeholder="ENTER LOG TITLE...">
            <label>CLEARANCE RESTRICTION</label>
            <select id="clearance_level"></select>
            <label>DOCUMENT CONTENT</label>
            <textarea id="content" rows="15"></textarea>
            <div class="btn-row" style="margin-top:8px;">
                <button onclick="saveDocument()">SAVE_CHANGES</button>
                <button class="btn-red" onclick="deleteDocument()">DELETE_DOCUMENT</button>
            </div>
        </div>
    </div>

    <script>
        let currentProfile = null, articleId = null, articleTitle = null;

        async function initEdit() {
            const auth = await requireAuth();
            if (!auth) return;
            currentProfile = auth.profile;

            startPresence(auth.profile);
            initNotificationListeners(auth.profile);

            articleId = new URLSearchParams(window.location.search).get('id');
            if (!articleId) { document.getElementById('form-header').innerText = 'ERROR: NO_DOCUMENT_ID'; return; }

            const { data: art, error } = await _supabase.from('articles').select('*').eq('id', articleId).single();
            if (error || !art) { document.getElementById('form-header').innerText = 'ERROR: DOCUMENT_NOT_FOUND'; return; }

            const isElevated = currentProfile.is_admin || currentProfile.is_overseer || currentProfile.is_terminal_admin;
            const isAuthor   = art.author === currentProfile.full_name;
            if (!isElevated && !isAuthor) {
                toast('ACCESS_DENIED: INSUFFICIENT_PRIVILEGES', 'error');
                setTimeout(() => window.location.href = 'archive.html', 1500);
                return;
            }

            // Populate clearance dropdown — elevated users can set any level, authors capped to their own
            populateClearanceSelect('clearance_level', art.required_clearance, isElevated ? 8 : currentProfile.clearance_level);

            articleTitle = art.title || 'UNTITLED';
            document.getElementById('form-header').innerText = `EDITING: ${articleTitle.toUpperCase()}`;
            document.getElementById('title').value   = art.title || '';
            document.getElementById('content').value = art.content || '';
        }

        async function saveDocument() {
            const title     = document.getElementById('title').value.trim();
            const content   = document.getElementById('content').value.trim();
            const clearance = parseInt(document.getElementById('clearance_level').value);
            if (!title || !content) { toast('CRITICAL_ERROR: DATA_MISSING', 'error'); return; }

            const clInfo    = getClearanceByLevel(clearance);
            const confirmed = await showModal(`SAVE CHANGES TO THIS DOCUMENT?`, { title:'CONFIRM_UPDATE', confirmText:'SAVE', cancelText:'CANCEL' });
            if (!confirmed) return;

            const { error } = await _supabase.from('articles')
                .update({ title, content, required_clearance: clearance })
                .eq('id', articleId);
            if (error) { toast('UPDATE_FAILED: ' + error.message, 'error'); return; }
            await logAction(currentProfile, 'EDITED', title, `CL: ${clInfo.short}`);
            toast('DOCUMENT_UPDATED_SUCCESSFULLY', 'success');
            setTimeout(() => window.location.href = `view.html?id=${articleId}`, 1200);
        }

        async function deleteDocument() {
            const confirmed = await showModal(
                'THIS ACTION IS PERMANENT.\nTHE DOCUMENT WILL BE ERASED FROM THE ARCHIVE.',
                { title:'CONFIRM_DELETION', confirmText:'DELETE', cancelText:'ABORT', danger:true }
            );
            if (!confirmed) return;
            const { error } = await _supabase.from('articles').delete().eq('id', articleId);
            if (error) { toast('DELETE_FAILED: ' + error.message, 'error'); return; }
            await logAction(currentProfile, 'DELETED', articleTitle, 'Document permanently deleted');
            toast('DOCUMENT_PERMANENTLY_DELETED', 'warning');
            setTimeout(() => window.location.href = 'archive.html', 1200);
        }

        window.onload = initEdit;
    </script>
</body>
</html>
