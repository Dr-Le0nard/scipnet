<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SCiPNET - Document Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="alert.js"></script>
    <script src="toast.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="identity-block">
        <a href="dashboard.html" style="text-decoration:none;"><div class="logo">SCIPNET<span>SECURE INTRANET // SITE-19</span></div></a>
    </div>
    <nav class="main-nav">
        <a href="dashboard.html">DASHBOARD</a>
        <a href="archive.html">DATABASE_ARCHIVE</a>
        <a href="personnel.html">PERSONNEL_DIRECTORY</a>
        <a href="profile.html">MY_PROFILE</a>
    </nav>
    <div class="page-content page-wrapper fade-in">
        <div class="page-title" id="doc-title">ACCESSING_SECURE_FILE...</div>
        <div class="page-subtitle">DOCUMENT VIEWER // CLASSIFIED MATERIAL</div>
        <div class="document-meta" id="doc-meta" style="display:none;">
            <div class="meta-item"><span class="meta-label">AUTHOR</span><span class="meta-value" id="doc-author">---</span></div>
            <div class="meta-item"><span class="meta-label">DEPARTMENT</span><span class="meta-value" id="doc-dept">---</span></div>
            <div class="meta-item"><span class="meta-label">CLEARANCE</span><span class="meta-value" id="doc-cl">---</span></div>
            <div class="meta-item"><span class="meta-label">FILED</span><span class="meta-value" id="doc-date">---</span></div>
        </div>
        <div class="document-body" id="doc-content">LOADING...</div>
        <div class="btn-row" style="margin-top:20px;" id="doc-actions">
            <button onclick="window.location.href='archive.html'">RETURN_TO_ARCHIVE</button>
        </div>
    </div>
    <script>
        async function displayArticle(){
            const auth=await requireAuth();if(!auth)return;
            const{profile}=auth;
            const id=new URLSearchParams(window.location.search).get('id');
            if(!id){document.getElementById('doc-title').innerText='ERROR: NO_ID_PROVIDED';return;}
            const{data:art,error}=await _supabase.from('articles').select('*').eq('id',id).single();
            if(error||!art){showAccessDenied();return;}
            const isElevated=profile.is_terminal_admin||profile.is_overseer||profile.is_admin;
            if(!isElevated&&(art.department!==profile.department||profile.clearance_level<art.required_clearance)){showAccessDenied();return;}
            document.getElementById('doc-title').innerText=art.title||'UNTITLED_FILE';
            document.getElementById('doc-author').innerText=art.author||'REDACTED';
            document.getElementById('doc-dept').innerText=`[${art.department||'GENERAL'}]`;
            document.getElementById('doc-cl').innerText=`LEVEL_${art.required_clearance}`;
            document.getElementById('doc-date').innerText=new Date(art.created_at).toLocaleDateString();
            document.getElementById('doc-content').innerText=art.content||'[DATA EXPUNGED]';
            document.getElementById('doc-meta').style.display='grid';
            const canEdit=isElevated||art.author===profile.full_name;
            if(canEdit){document.getElementById('doc-actions').innerHTML+=`<button class="btn-gold" onclick="window.location.href='edit.html?id=${art.id}'">EDIT_DOCUMENT</button>`;}
        }
        function showAccessDenied(){
            document.body.innerHTML=`
                <div style="background:#020000;color:var(--red);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-family:'VT323',monospace;border:2px solid var(--red);">
                    <div style="font-size:3rem;animation:flicker 0.5s infinite;letter-spacing:6px;">[ ACCESS_DENIED ]</div>
                    <div style="border:1px solid var(--red);padding:20px;margin:20px;max-width:500px;background:rgba(255,0,0,0.03);">
                        <p style="margin-bottom:12px;">MEMETIC KILL AGENT ACTIVATED.</p>
                        <p style="margin-bottom:12px;">REMAIN CALM. DO NOT ATTEMPT TO LEAVE YOUR TERMINAL.</p>
                        <p>SECURITY TEAMS HAVE BEEN DISPATCHED TO YOUR LOCATION.</p>
                    </div>
                    <a href="archive.html" style="color:var(--red);border:1px solid var(--red);padding:8px 24px;font-family:'VT323',monospace;letter-spacing:2px;font-size:1rem;">RETURN_TO_ARCHIVE</a>
                </div>`;
        }
        window.onload=displayArticle;
    </script>
</body>
</html>
