<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCiPNET - File Report</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="departments.js"></script>
    <script src="alert.js?v=20260430-2"></script>
    <script src="toast.js"></script>
    <script src="notifications.js"></script>
    <script src="modal.js"></script>
    <script src="nav.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>
    <div class="identity-block">
        <a href="dashboard.html" style="text-decoration:none;"><div class="logo">SCIPNET<span>SECURE INTRANET // SITE-19</span></div></a>
    </div>
    <nav class="main-nav" id="main-nav"></nav>

    <div class="page-content page-wrapper fade-in">
        <div class="page-title" id="form-header">INITIALIZING_REPORT_MODULE</div>
        <div class="page-subtitle">SECURE DOCUMENT SUBMISSION // AUTHORIZED PERSONNEL ONLY</div>
        <div style="max-width:800px;">
            <div id="dynamic-fields" style="margin-bottom:16px;"></div>
            <label>DOCUMENT TITLE</label>
            <input type="text" id="title" placeholder="ENTER LOG TITLE...">
            <label>CLEARANCE RESTRICTION</label>
            <select id="clearance_level"></select>
            <label>DOCUMENT CONTENT</label>
            <textarea id="content" rows="15" placeholder="BEGIN DATA ENTRY..."></textarea>
            <div class="btn-row" style="margin-top:8px;">
                <button class="btn-full" onclick="submitReport()">TRANSMIT_TO_SECURE_SERVERS</button>
            </div>
        </div>
    </div>

    <script>
        let currentUserProfile = null;
        const reportModule = new URLSearchParams(window.location.search).get('type') || 'general';

        async function initializeForm() {
            const auth = await requireAuth();
            if (!auth) return;
            currentUserProfile = auth.profile;
            const _myRoles = await fetchMyRoles();
            currentUserProfile._activeRole = getActiveRole(auth.profile, _myRoles);

            startPresence(auth.profile);
            initNotificationListeners(auth.profile);
            
            document.getElementById('form-header').innerText = `NEW_${reportModule.toUpperCase()}_ENTRY`;

            const active = currentUserProfile._activeRole;
            document.getElementById('form-header').insertAdjacentHTML('afterend',
                `<div style="font-size:0.72rem;color:var(--text-dim);letter-spacing:1px;margin-bottom:12px;">
                    FILING AS: <span style="color:var(--green);">${active.name}</span>
                    [${active.department}]
                    ${active.isSecondary ? '' : '— PRIMARY ROLE'}
                    &nbsp;<a href="profile.html" style="color:rgba(0,255,65,0.4);font-size:0.7rem;">[SWITCH ROLE]</a>
                </div>`
            );

            // Populate clearance dropdown capped to user's own level
            populateClearanceSelect('clearance_level', 0, currentUserProfile.clearance_level);

            setupExtraFields();
        }

        function setupExtraFields() {
            const container = document.getElementById('dynamic-fields');
            const wrap = (html) => `<div style="border-left:2px solid var(--green-border);padding-left:14px;margin-bottom:16px;">${html}</div>`;
            if (reportModule === 'research') {
                container.innerHTML = wrap(`<label>SUBJECT ID</label><input type="text" id="meta_subject" placeholder="e.g. SCP-096"><label>TEST PHASE</label><input type="text" id="meta_phase" placeholder="e.g. Initial Exposure">`);
            } else if (reportModule === 'medical') {
                container.innerHTML = wrap(`<label>PATIENT ID</label><input type="text" id="meta_patient" placeholder="e.g. D-9022">`);
            } else if (reportModule === 'mtf') {
                container.innerHTML = wrap(`<label>OPERATION NAME</label><input type="text" id="meta_operation" placeholder="e.g. OPERATION WHITEBOARD"><label>MTF UNIT</label><input type="text" id="meta_unit" placeholder="e.g. MTF ε-11 Nine Tailed Fox">`);
            } else if (reportModule === 'intel') {
                container.innerHTML = wrap(`<label>CLASSIFICATION LEVEL</label><input type="text" id="meta_classification" placeholder="e.g. EYES ONLY"><label>SOURCE</label><input type="text" id="meta_source" placeholder="e.g. ASSET CODENAME">`);
            } else if (reportModule === 'external') {
                container.innerHTML = wrap(`<label>GROUP OF INTEREST</label><input type="text" id="meta_goi" placeholder="e.g. Serpent's Hand"><label>INCIDENT LOCATION</label><input type="text" id="meta_location" placeholder="e.g. Site-19 Perimeter">`);
            }
        }

        async function submitReport() {
            const title   = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();
            const cl      = parseInt(document.getElementById('clearance_level').value);
            if (!title || !content) { toast('CRITICAL_ERROR: DATA_MISSING', 'error'); return; }
            if (cl > currentUserProfile.clearance_level) { toast('ACCESS_DENIED: CLEARANCE_EXCEEDS_AUTHORIZATION', 'error'); return; }

            const clInfo = getClearanceByLevel(cl);
            const confirmed = await showModal(
                `TRANSMIT DOCUMENT TO SECURE SERVERS?\n\nTITLE: ${title}\nCLEARANCE: ${clInfo.label}`,
                { title:'CONFIRM_TRANSMISSION', confirmText:'TRANSMIT', cancelText:'ABORT' }
            );
            if (!confirmed) return;

            let finalContent = '';
            document.querySelectorAll('#dynamic-fields input').forEach(input => {
                const lbl = input.previousElementSibling?.innerText || '';
                if (input.value.trim()) finalContent += `${lbl} ${input.value.trim()}\n`;
            });
            finalContent += (finalContent ? '\n' : '') + content;

            const { error } = await _supabase.from('articles').insert([{
                title, content: finalContent,
                author:     currentUserProfile._activeRole.name,
                department: currentUserProfile._activeRole.department,
                required_clearance: cl
            }]);

            if (error) { toast('TRANSMISSION_FAILED: ' + error.message, 'error'); return; }
            await logAction(currentUserProfile, 'CREATED', title, `Dept: ${currentUserProfile.department} | CL: ${clInfo.short}`);
            toast('TRANSMISSION_SUCCESSFUL', 'success');
            setTimeout(() => window.location.href = 'archive.html', 1200);
        }

        window.onload = initializeForm;
    </script>
</body>
</html>
