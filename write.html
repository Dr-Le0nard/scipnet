<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SCiPNET - Departmental Entry</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="alert.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="form-header">INITIALIZING_REPORT_MODULE...</h1>
    <nav>
        <a href="dashboard.html">BACK_TO_DASHBOARD</a>
    </nav>

    <div class="input-container" style="display: flex; flex-direction: column; width: 100%; max-width: 800px;">
        <div id="dynamic-fields" style="border-left: 2px solid var(--terminal-green); padding-left: 15px; margin-bottom: 20px;"></div>

        <label>DOCUMENT_TITLE:</label>
        <input type="text" id="title" placeholder="ENTER_LOG_TITLE">

        <label>CLEARANCE_RESTRICTION:</label>
        <select id="clearance_level">
            <option value="0">LEVEL_0 (PUBLIC)</option>
            <option value="1">LEVEL_1 (RESTRICTED)</option>
            <option value="2">LEVEL_2 (CONFIDENTIAL)</option>
            <option value="3">LEVEL_3 (SECRET)</option>
            <option value="4">LEVEL_4 (TOP_SECRET)</option>
            <option value="5">LEVEL_5 (O5_ONLY)</option>
        </select>

        <label>DOCUMENT_CONTENT:</label>
        <textarea id="content" rows="15" placeholder="START DATA ENTRY..."></textarea>

        <button onclick="submitReport()" style="margin-top: 25px; width: 100%;">TRANSMIT_TO_SECURE_SERVERS</button>
    </div>

    <script>
        let currentUserProfile = null;
        const urlParams = new URLSearchParams(window.location.search);
        const reportModule = urlParams.get('type') || 'general';

        async function initializeForm() {
            const auth = await requireAuth();
            if (!auth) return;

            currentUserProfile = auth.profile;

            document.getElementById('form-header').innerText = `NEW_${reportModule.toUpperCase()}_ENTRY`;

            // Cap clearance options to the user's own clearance level
            // (Prevents a Level 1 user from filing a Level 5 document)
            capClearanceOptions(currentUserProfile.clearance_level);

            setupExtraFields();
        }

        function capClearanceOptions(userClearance) {
            const select = document.getElementById('clearance_level');
            // Admins and above can set any level
            if (currentUserProfile.is_admin || currentUserProfile.is_overseer || currentUserProfile.is_terminal_admin) return;

            Array.from(select.options).forEach(option => {
                if (parseInt(option.value) > userClearance) {
                    option.disabled = true;
                    option.text += " [UNAUTHORIZED]";
                }
            });
        }

        function setupExtraFields() {
            const container = document.getElementById('dynamic-fields');
            if (reportModule === 'research') {
                container.innerHTML = `
                    <label>SUBJECT_ID:</label>
                    <input type="text" id="meta_subject" placeholder="e.g. SCP-096">
                    <label>TEST_PHASE:</label>
                    <input type="text" id="meta_phase" placeholder="e.g. Initial Exposure">
                `;
            } else if (reportModule === 'medical') {
                container.innerHTML = `
                    <label>PATIENT_ID:</label>
                    <input type="text" id="meta_patient" placeholder="e.g. D-9022">
                `;
            }
            // Container is left empty for other modules — no visible border artifact
            if (container.innerHTML.trim() === '') {
                container.style.borderLeft = 'none';
                container.style.paddingLeft = '0';
            }
        }

        async function submitReport() {
            const titleInput = document.getElementById('title').value.trim();
            const contentInput = document.getElementById('content').value.trim();
            const cl = parseInt(document.getElementById('clearance_level').value);

            if (!titleInput || !contentInput) {
                alert("CRITICAL_ERROR: DATA_MISSING");
                return;
            }

            // Double-check clearance cap server-side is handled by RLS,
            // but we enforce client-side too
            const isElevated = currentUserProfile.is_admin || currentUserProfile.is_overseer || currentUserProfile.is_terminal_admin;
            if (!isElevated && cl > currentUserProfile.clearance_level) {
                alert("ACCESS_DENIED: CLEARANCE_LEVEL_EXCEEDS_YOUR_AUTHORIZATION");
                return;
            }

            // Prepend any extra dynamic field data to the content
            let finalizedContent = "";
            const extraInputs = document.querySelectorAll('#dynamic-fields input');
            extraInputs.forEach(input => {
                const label = input.previousElementSibling?.innerText || '';
                if (input.value.trim()) {
                    finalizedContent += `${label} ${input.value.trim()}\n`;
                }
            });
            finalizedContent += (finalizedContent ? "\n" : "") + contentInput;

            const { error } = await _supabase
                .from('articles')
                .insert([{
                    title: titleInput,
                    content: finalizedContent,
                    author: currentUserProfile.full_name,
                    department: currentUserProfile.department,
                    required_clearance: cl
                }]);

            if (error) {
                alert("TRANSMISSION_FAILED: " + error.message);
            } else {
                alert("TRANSMISSION_SUCCESSFUL");
                window.location.href = "archive.html";
            }
        }

        window.onload = initializeForm;
    </script>
</body>
</html>
