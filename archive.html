<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCiPNET - Records Archive</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="dom.js"></script>
    <script src="alert.js?v=20260430-2"></script>
    <script src="toast.js"></script>
    <script src="notifications.js"></script>
    <script src="modal.js"></script>
    <script src="nav.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        .cl-0 { border-left: 2px solid transparent; }
        .cl-1 { border-left: 2px solid rgba(74,222,128,0.3); }
        .cl-2 { border-left: 2px solid rgba(250,204,21,0.3); }
        .cl-3 { border-left: 2px solid rgba(251,146,60,0.3); }
        .cl-4 { border-left: 2px solid rgba(255,62,62,0.3); }
        .cl-5 { border-left: 2px solid rgba(167,139,250,0.4); }
        .cl-6 { border-left: 2px solid rgba(255,215,0,0.4); }
        .cl-7 { border-left: 2px solid rgba(255,62,62,0.5); }
        .cl-8 { border-left: 2px solid rgba(255,215,0,0.6); }
 
        .cl-0 td:nth-child(3) { color: var(--text-dim); }
        .cl-1 td:nth-child(3) { color: #4ade80; }
        .cl-2 td:nth-child(3) { color: #facc15; }
        .cl-3 td:nth-child(3) { color: #fb923c; }
        .cl-4 td:nth-child(3) { color: var(--red); }
        .cl-5 td:nth-child(3) { color: #a78bfa; }
        .cl-6 td:nth-child(3) { color: var(--gold); }
        .cl-7 td:nth-child(3) { color: var(--red); }
        .cl-8 td:nth-child(3) { color: var(--gold); }
        .sort-btn { font-size:0.75rem; padding:3px 10px; letter-spacing:1px; color:var(--text-dim); border-color:rgba(0,255,65,0.15); }
        .sort-btn.active { color:var(--green); border-color:var(--green-border); background:var(--green-glow); }
        th.sortable { cursor:pointer; user-select:none; }
        th.sortable:hover { color:var(--green); }
        th.sort-asc::after  { content: ' ▲'; font-size:0.7rem; }
        th.sort-desc::after { content: ' ▼'; font-size:0.7rem; }
    </style>
</head>
<body>
    <div class="identity-block">
        <a href="dashboard.html" style="text-decoration:none;"><div class="logo">SCIPNET<span>SECURE INTRANET // SITE-19</span></div></a>
    </div>
    <nav class="main-nav" id="main-nav"></nav>

    <div class="page-content page-wrapper fade-in">
        <div class="page-title">DATABASE_ARCHIVE</div>
        <div class="page-subtitle">SECURE DOCUMENT REPOSITORY // CLEARANCE-GATED ACCESS</div>

        <div class="overseer-filter" id="overseer-filters">
            <label>OVERSEER_VIEW:</label>
            <select id="dept-filter" onchange="fetchReports()">
                <option value="ALL">ALL_DEPARTMENTS</option>
                <option value="ScD">SCIENTIFIC (ScD)</option>
                <option value="MD">MEDICAL (MD)</option>
                <option value="SD">SECURITY (SD)</option>
                <option value="EcD">ENGINEERING (EcD)</option>
                <option value="RAISA">INFOSEC (RAISA)</option>
                <option value="AD">ADMINISTRATIVE (AD)</option>
                <option value="DSIS">INTELLIGENCE (DSIS)</option>
            </select>
        </div>

        <!-- Clearance legend -->
        <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;font-size:0.68rem;letter-spacing:1px;color:var(--text-dim);">
            <span>CL:</span>
            <span style="color:var(--text-dim);">■ L0</span>
            <span style="color:#4ade80;">■ L1</span>
            <span style="color:#facc15;">■ L2</span>
            <span style="color:#fb923c;">■ L3</span>
            <span style="color:var(--red);">■ L4</span>
            <span style="color:#a78bfa;">■ L5</span>
            <span style="color:var(--gold);">■ OMNI</span>
            <span style="color:var(--red);">■ APOLLYON</span>
            <span style="color:var(--gold);">■ MASKUR</span>
        </div>

        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px;">
            <input type="text" id="doc-search" placeholder="SEARCH DOCUMENTS..." onkeyup="filterTable()" style="max-width:280px;margin-bottom:0;">
            <select id="cl-filter" onchange="filterTable()" style="max-width:140px;margin-bottom:0;">
                <option value="ALL">ALL CLEARANCES</option>
                <option value="0">L0 — PUBLIC</option>
                <option value="1">L1 — RESTRICTED</option>
                <option value="2">L2 — CONFIDENTIAL</option>
                <option value="3">L3 — SECRET</option>
                <option value="4">L4 — TOP SECRET</option>
                <option value="5">L5 — CLASSIFIED</option>
                <option value="6">OMNI</option>
                <option value="7">APOLLYON</option>
                <option value="8">MASKUR</option>
            </select>
            <span id="record-count" style="color:var(--text-dim);font-size:0.72rem;letter-spacing:1px;white-space:nowrap;margin-left:auto;"></span>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th class="sortable" onclick="setSort('date')"   id="th-date">DATE</th>
                        <th class="sortable" onclick="setSort('dept')"   id="th-dept">DEPT</th>
                        <th class="sortable" onclick="setSort('cl')"     id="th-cl">CL</th>
                        <th class="sortable" onclick="setSort('title')"  id="th-title">TITLE</th>
                        <th class="sortable" onclick="setSort('author')" id="th-author">AUTHOR</th>
                        <th>ACTION</th>
                    </tr>
                </thead>
                <tbody id="report-list">
                    <tr><td colspan="6" style="color:var(--text-dim);padding:20px;">RETRIEVING DATA...</td></tr>
                </tbody>
            </table>
        </div>

        <div id="pagination" style="display:flex;gap:8px;align-items:center;justify-content:center;margin-top:20px;flex-wrap:wrap;"></div>
    </div>

    <script>
        const PAGE_SIZE = 20;
        let currentProfile=null, isElevated=false, isAdmin=false;
        let allReports=[], filteredReports=[], currentPage=1;
        let sortField='date', sortDir='desc';

        const CL_COLORS = [
            'var(--text-dim)', // L0
            '#4ade80',         // L1
            '#facc15',         // L2
            '#fb923c',         // L3
            'var(--red)',      // L4
            '#a78bfa',         // L5
            'var(--gold)',     // L6 OMNI
            'var(--red)',      // L7 APOLLYON
            'var(--gold)',     // L8 MASKUR
        ];

        async function initArchive() {
            const auth = await requireAuth();
            if (!auth) return;
            currentProfile = auth.profile;

            startPresence(auth.profile);
            initNotificationListeners(auth.profile);

            if (currentProfile.is_terminal_admin || currentProfile.is_overseer) {
                isElevated = true;
                document.getElementById('overseer-filters').style.display = 'flex';
            } else if (currentProfile.is_admin) {
                isAdmin = true;
            }
            fetchReports();
        }

        async function fetchReports() {
            const list = document.getElementById('report-list');
            clearElement(list);
            {
                const tr = document.createElement('tr');
                const td = createSafeElement('td', 'RETRIEVING DATA...');
                td.colSpan = 6;
                td.style.color = 'var(--text-dim)';
                td.style.padding = '20px';
                tr.appendChild(td);
                list.appendChild(tr);
            }
            let query = _supabase.from('articles').select('*');
            if (!isElevated) {
                query = query.eq('department', currentProfile.department);
                if (!isAdmin) query = query.lte('required_clearance', currentProfile.clearance_level);
            } else {
                const filter = document.getElementById('dept-filter')?.value;
                if (filter && filter !== 'ALL') query = query.eq('department', filter);
            }
            const { data: reports, error } = await query;
            if (error) {
                clearElement(list);
                const tr = document.createElement('tr');
                const td = createSafeElement('td', `QUERY_ERROR: ${error.message || 'UNKNOWN_ERROR'}`);
                td.colSpan = 6;
                td.style.color = 'var(--red)';
                tr.appendChild(td);
                list.appendChild(tr);
                return;
            }
            allReports = reports;
            filteredReports = reports;
            currentPage = 1;
            applySort();
        }

        function setSort(field) {
            if (sortField === field) {
                sortDir = sortDir === 'asc' ? 'desc' : 'asc';
            } else {
                sortField = field;
                sortDir = field === 'date' ? 'desc' : 'asc';
            }
            updateSortHeaders();
            applySort();
        }

        function updateSortHeaders() {
            const fields = ['date','dept','cl','title','author'];
            fields.forEach(f => {
                const th = document.getElementById(`th-${f}`);
                if (!th) return;
                th.classList.remove('sort-asc','sort-desc');
                if (f === sortField) th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
            });
        }

        function applySort() {
            const q  = document.getElementById('doc-search').value.toLowerCase();
            const cl = document.getElementById('cl-filter').value;

            filteredReports = allReports.filter(r => {
                if (cl !== 'ALL' && r.required_clearance !== parseInt(cl)) return false;
                return (r.title||'').toLowerCase().includes(q) ||
                       (r.author||'').toLowerCase().includes(q) ||
                       (r.department||'').toLowerCase().includes(q);
            });

            filteredReports.sort((a, b) => {
                let valA, valB;
                switch (sortField) {
                    case 'date':   valA = new Date(a.created_at); valB = new Date(b.created_at); break;
                    case 'dept':   valA = (a.department||'').toLowerCase(); valB = (b.department||'').toLowerCase(); break;
                    case 'cl':     valA = a.required_clearance ?? 0; valB = b.required_clearance ?? 0; break;
                    case 'title':  valA = (a.title||'').toLowerCase(); valB = (b.title||'').toLowerCase(); break;
                    case 'author': valA = (a.author||'').toLowerCase(); valB = (b.author||'').toLowerCase(); break;
                    default:       valA = new Date(a.created_at); valB = new Date(b.created_at);
                }
                if (valA < valB) return sortDir === 'asc' ? -1 : 1;
                if (valA > valB) return sortDir === 'asc' ? 1 : -1;
                return 0;
            });

            currentPage = 1;
            renderPage();
        }

        function filterTable() { applySort(); }

        function renderPage() {
            const list       = document.getElementById('report-list');
            const countEl    = document.getElementById('record-count');
            const pagination = document.getElementById('pagination');

            if (filteredReports.length === 0) {
                clearElement(list);
                const tr = document.createElement('tr');
                const td = createSafeElement('td', 'NO RECORDS FOUND');
                td.colSpan = 6;
                td.style.color = 'var(--text-dim)';
                td.style.padding = '20px';
                tr.appendChild(td);
                list.appendChild(tr);
                countEl.innerText = '';
                clearElement(pagination);
                return;
            }

            const totalPages = Math.ceil(filteredReports.length / PAGE_SIZE);
            const start = (currentPage - 1) * PAGE_SIZE;
            const pageReports = filteredReports.slice(start, start + PAGE_SIZE);
            const isElevatedUser = currentProfile.is_admin || currentProfile.is_overseer || currentProfile.is_terminal_admin;

            countEl.innerText = `${filteredReports.length} RECORD${filteredReports.length !== 1 ? 'S' : ''} // PAGE ${currentPage}/${totalPages}`;

            clearElement(list);
            pageReports.forEach(r => {
                const date    = new Date(r.created_at).toLocaleDateString();
                const canEdit = isElevatedUser || r.author === currentProfile.full_name;
                const cl      = r.required_clearance ?? 0;
                const clColor = CL_COLORS[Math.min(cl, 8)];

                const tr = document.createElement('tr');
                tr.className = `cl-${cl}`;

                tr.appendChild(createSafeElement('td', date));

                const tdDept = document.createElement('td');
                const deptSpan = createSafeElement('span', `[${r.department || 'N/A'}]`);
                deptSpan.style.color = 'var(--text-dim)';
                tdDept.appendChild(deptSpan);
                tr.appendChild(tdDept);

                const tdCl = document.createElement('td');
                const clSpan = createSafeElement('span', cl >= 6 ? ['OMNI','APOLLYON','MASKUR'][cl-6] : 'L' + cl);
                clSpan.style.color = clColor;
                clSpan.style.fontFamily = 'var(--font-display)';
                clSpan.style.letterSpacing = '1px';
                tdCl.appendChild(clSpan);
                tr.appendChild(tdCl);

                const tdTitle = createSafeElement('td', r.title || 'UNTITLED');
                tdTitle.style.color = 'var(--green)';
                tr.appendChild(tdTitle);

                const tdAuthor = createSafeElement('td', r.author || 'UNKNOWN');
                tdAuthor.style.color = 'var(--text-mid)';
                tr.appendChild(tdAuthor);

                const tdAct = document.createElement('td');
                const row = document.createElement('div');
                row.className = 'btn-row';
                const open = createSafeElement('button', 'OPEN');
                open.addEventListener('click', () => { window.location.href = `view.html?id=${r.id}`; });
                row.appendChild(open);
                if (canEdit) {
                    const edit = createSafeElement('button', 'EDIT', 'btn-gold');
                    edit.addEventListener('click', () => { window.location.href = `edit.html?id=${r.id}`; });
                    row.appendChild(edit);
                }
                tdAct.appendChild(row);
                tr.appendChild(tdAct);

                list.appendChild(tr);
            });

            clearElement(pagination);
            if (totalPages <= 1) return;

            const prev = createSafeElement('button', '◄');
            prev.disabled = currentPage === 1;
            prev.addEventListener('click', () => goToPage(currentPage - 1));
            pagination.appendChild(prev);

            getPageRange(currentPage, totalPages).forEach(p => {
                if (p === '...') {
                    const dots = createSafeElement('span', '...');
                    dots.style.color = 'var(--text-dim)';
                    dots.style.padding = '0 4px';
                    pagination.appendChild(dots);
                    return;
                }
                const btn = createSafeElement('button', String(p));
                if (p === currentPage) {
                    btn.style.borderColor = 'var(--green)';
                    btn.style.background = 'var(--green-glow)';
                }
                btn.addEventListener('click', () => goToPage(p));
                pagination.appendChild(btn);
            });

            const next = createSafeElement('button', '►');
            next.disabled = currentPage === totalPages;
            next.addEventListener('click', () => goToPage(currentPage + 1));
            pagination.appendChild(next);
        }

        function goToPage(page) {
            const totalPages = Math.ceil(filteredReports.length / PAGE_SIZE);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderPage();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function getPageRange(current, total) {
            if (total <= 7) return Array.from({ length: total }, (_, i) => i + 1);
            if (current <= 4) return [1,2,3,4,5,'...',total];
            if (current >= total - 3) return [1,'...',total-4,total-3,total-2,total-1,total];
            return [1,'...',current-1,current,current+1,'...',total];
        }

        updateSortHeaders();
        window.onload = initArchive;
    </script>
</body>
</html>
