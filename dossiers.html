<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCIPNET - DOSSIERS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it/dist/markdown-it.min.js"></script>
    <script src="config.js"></script>
    <script src="dom.js"></script>
    <script src="departments.js"></script>
    <script src="alert.js?v=20260430-2"></script>
    <script src="toast.js"></script>
    <script src="notifications.js"></script>
    <script src="modal.js"></script>
    <script src="nav.js"></script>
    <script src="dossiers.js"></script>
    <script src="scpData.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* SCiPNET dossier hierarchy: section titles must dominate markdown content */
        .scp-dossier-title {
            font-family: var(--font-display);
            font-size: 1.6rem;
            letter-spacing: 3px;
            color: var(--green);
            margin-bottom: 6px;
            line-height: 1.2;
            text-shadow: 0 0 14px rgba(0,255,65,0.35);
        }
        .scp-section-title {
            font-family: var(--font-display);
            font-size: 1.12rem;
            letter-spacing: 3px;
            color: var(--text-mid);
            text-transform: uppercase;
            border-bottom: 1px solid var(--green-border);
            padding-bottom: 6px;
            margin-top: 20px;
        }
        .scp-section-title::before { content: '// '; color: var(--text-dim); }

        .formatted-text {
            white-space: pre-wrap;
            font-size: 0.95rem;
            line-height: 1.65;
            letter-spacing: 0.02em;
            margin: 0;
        }
        /* Normalize markdown headers so they never overpower SCiPNET section titles */
        .formatted-text h1 { font-size: 1.05rem; letter-spacing: 2px; margin: 0.9rem 0 0.4rem; color: var(--green); font-family: var(--font-display); }
        .formatted-text h2 { font-size: 0.98rem; letter-spacing: 2px; margin: 0.85rem 0 0.35rem; color: var(--text-mid); font-family: var(--font-display); }
        .formatted-text h3 { font-size: 0.9rem;  letter-spacing: 1px; margin: 0.75rem 0 0.3rem;  color: var(--text-dim); font-family: var(--font-display); }
        .formatted-text h1,
        .formatted-text h2,
        .formatted-text h3 {
            margin: 1rem 0 0.5rem;
        }
        .formatted-text p {
            margin: 0.75rem 0;
        }
        .formatted-text ul,
        .formatted-text ol {
            margin: 0.75rem 0 0.75rem 1.25rem;
        }
        .formatted-text li {
            margin: 0.25rem 0;
        }
    </style>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>
    <div class="identity-block">
        <a href="dashboard.html" style="text-decoration:none;"><div class="logo">SCIPNET<span>SECURE INTRANET // SITE-19</span></div></a>
    </div>
    <nav class="main-nav" id="main-nav"></nav>

    <div class="page-content page-wrapper fade-in">
        <div class="page-title">DOSSIERS</div>
        <div class="page-subtitle">DOSSIERS STORAGE FOR SCIENTIFIC DEPARTMENT CONTAINMENT RECORDS</div>
        <div id="access-summary" style="margin-bottom:18px; color:var(--text-dim);"></div>
        <div id="dossier-cl4-warning" class="alert-section" style="display:none;margin-bottom:18px; padding:12px; border:1px solid rgba(255,62,62,0.25); background:rgba(255,62,62,0.06);">
            UNAUTHORIZED_FOR_DOCUMENT_APPROVAL: CL4+ REQUIRED FOR APPROVAL, EDITS, AND LOG MODIFICATION.
        </div>

        <div class="section-header">DOSSIERS LIST</div>
        <div class="section-block" style="margin-bottom:20px; display:grid; gap:14px;">
            <div style="display:flex; flex-wrap:wrap; gap:12px; align-items:center;">
                <input id="dossier-search" type="text" placeholder="SEARCH DOSSIERS..." oninput="renderDossierList()" style="flex:1; min-width:220px;">
                <select id="filter-status" onchange="renderDossierList()" style="min-width:170px;">
                    <option value="">ALL STATUSES</option>
                    <option value="Pending Approval">Pending Approval</option>
                    <option value="Approved">Approved</option>
                </select>
                <select id="filter-class" onchange="renderDossierList()" style="min-width:170px;">
                    <option value="">ALL CLASSES</option>
                    <option value="Safe">Safe</option>
                    <option value="Euclid">Euclid</option>
                    <option value="Keter">Keter</option>
                    <option value="Apollyon">Apollyon</option>
                </select>
                <select id="filter-clearance" onchange="renderDossierList()" style="min-width:170px;">
                    <option value="">ALL CLEARANCES</option>
                    <option value="0">CL0+</option>
                    <option value="1">CL1+</option>
                    <option value="2">CL2+</option>
                    <option value="3">CL3+</option>
                    <option value="4">CL4+</option>
                    <option value="5">CL5+</option>
                    <option value="6">CL6+</option>
                    <option value="7">CL7+</option>
                    <option value="8">CL8+</option>
                </select>
                <!-- CRITICAL: SCP entries are hardcoded; users cannot create dossiers -->
            </div>
        </div>

        <div id="dossier-list" class="section-block" style="margin-bottom:20px; display:grid; gap:14px;"></div>

        <div id="new-dossier-section" class="section-block" style="display:none; margin-bottom:20px;">
            <div class="section-header">NEW DOSSIER</div>
            <div style="max-width:860px; display:grid; gap:12px;">
                <label>DOSSIER DESIGNATION</label>
                <input type="text" id="dossier-designation" placeholder="ENTER DOSSIER-XXX...">

                <label>OBJECT CLASS</label>
                <select id="dossier-object-class"></select>

                <label>CLEARANCE LEVEL</label>
                <select id="dossier-clearance-level"></select>

                <label>AUTHOR</label>
                <input type="text" id="dossier-author" readonly>

                <label>DESCRIPTION</label>
                <textarea id="dossier-description" rows="4" placeholder="PHYSICAL TRAITS, BEHAVIOR, ANOMALOUS EFFECTS..."></textarea>

                <label>SPECIAL CONTAINMENT PROCEDURES</label>
                <textarea id="dossier-containment" rows="4" placeholder="CONTAINMENT METHOD, ENVIRONMENT, REQUIRED PERSONNEL..."></textarea>

                <label>RECONTAINMENT PROCEDURES</label>
                <textarea id="dossier-recontainment" rows="4" placeholder="BREACH RESPONSE STEPS..."></textarea>

                <div class="btn-row" style="margin-top:10px; gap:12px;">
                    <button class="btn-full" onclick="createDossierEntry()">CREATE DOSSIER ENTRY</button>
                    <button class="btn" onclick="toggleNewDossierSection()">CANCEL</button>
                </div>
            </div>
        </div>

        <div id="document-summary" class="section-block" style="margin-bottom:20px; display:none;"></div>

        <div id="edit-document-section" class="section-block" style="display:none; margin-bottom:20px;">
            <div class="section-header">EDIT DOSSIER</div>
            <label>OBJECT CLASS</label>
            <select id="edit-object-class"></select>
            <label>CLEARANCE LEVEL</label>
            <select id="edit-clearance-level"></select>
            <label>DESCRIPTION</label>
            <textarea id="edit-description" rows="4"></textarea>
            <label>CONTAINMENT PROCEDURES</label>
            <textarea id="edit-containment" rows="4"></textarea>
            <label>RECONTAINMENT PROCEDURES</label>
            <textarea id="edit-recontainment" rows="4"></textarea>
            <div class="btn-row" style="margin-top:10px; gap:12px;">
                <button class="btn-full" onclick="saveDocumentEdit()">SAVE CHANGES</button>
                <button class="btn" onclick="closeEditSection()">CANCEL</button>
            </div>
        </div>

        <div id="test-log-section" class="section-block" style="display:none; margin-bottom:20px;">
            <div class="section-header">TESTING LOGS</div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px;">
                <input type="text" id="log-search" placeholder="SEARCH LOGS & INCIDENTS..." oninput="renderSearchResults()" style="flex:1;min-width:240px;margin-bottom:0;">
                <select id="log-scp-filter" onchange="renderSearchResults()" style="min-width:180px;margin-bottom:0;">
                    <option value="ALL">ALL SCPs</option>
                </select>
            </div>
            <div id="search-results" style="display:none;border:1px solid rgba(0,255,65,0.15);background:rgba(0,8,1,0.4);padding:12px;margin-bottom:14px;"></div>
            <label>TEST PERSONNEL</label>
            <input type="text" id="test-personnel" placeholder="Comma-separated personnel..."></input>
            <label>PROCEDURE</label>
            <textarea id="test-procedure" rows="3"></textarea>
            <label>RESULT</label>
            <textarea id="test-result" rows="3"></textarea>
            <div class="btn-row" style="margin-top:10px; gap:12px;">
                <button class="btn-full" onclick="saveTestLog()">ADD TEST LOG</button>
                <button id="clear-test-edit" class="btn" style="display:none;" onclick="resetTestLogForm()">CLEAR EDIT</button>
            </div>
            <div id="test-log-list" style="margin-top:16px;"></div>
        </div>

        <div id="incident-section" class="section-block" style="display:none; margin-bottom:32px;">
            <div class="section-header">INCIDENT REPORTS</div>
            <label>DATE</label>
            <input type="date" id="incident-date">
            <label>INVOLVED UNITS</label>
            <input type="text" id="incident-units" placeholder="MTF, SD, ScD..."></input>
            <label>CAUSE</label>
            <textarea id="incident-cause" rows="2"></textarea>
            <label>RESOLUTION</label>
            <textarea id="incident-resolution" rows="2"></textarea>
            <label>PREVENTION NOTES</label>
            <textarea id="incident-prevention" rows="2"></textarea>
            <div class="btn-row" style="margin-top:10px; gap:12px;">
                <button class="btn-full" onclick="saveIncidentReport()">ADD INCIDENT REPORT</button>
                <button id="clear-incident-edit" class="btn" style="display:none;" onclick="resetIncidentForm()">CLEAR EDIT</button>
            </div>
            <div id="incident-list" style="margin-top:16px;"></div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'dossiers_storage';
        let currentProfile = null;
        let currentRoles = [];
        let activeRole = null;
        let repository = null;
        let selectedDesignation = null;
        let editingTestLogId = null;
        let editingIncidentId = null;

        const markdownRenderer = window.markdownit ? window.markdownit({ html: false, linkify: true, typographer: true, breaks: true }) : null;

        function parseClearanceMin(levelStr) {
            if (typeof levelStr === 'number') return levelStr;
            const m = String(levelStr || '').match(/(\d+)/);
            return m ? parseInt(m[1], 10) : 0;
        }

        function buildRepositoryFromHardcoded() {
            const base = (window.SCP_DOSSIERS || []).map(scp => ({
                designation: scp.id,
                objectClass: scp.objectClass,
                clearanceLevel: parseClearanceMin(scp.clearanceLevel),
                status: DOSSIERS.DOSSIER_STATUSES.APPROVED,
                author: 'SYSTEM',
                description: scp.description || '',
                containmentProcedures: scp.containmentProcedures || '',
                recontainmentProcedures: scp.recontainmentProcedures || '',
                testingGuidelines: scp.testingGuidelines || '',
                testLogs: [],
                incidentReports: []
            }));
            return new DOSSIERS.DossierRepository(base);
        }

        function mergeDynamicEntriesIntoBase(baseRepo, dynamicRepo) {
            try {
                dynamicRepo.listDocuments().forEach(doc => {
                    const id = doc.designation;
                    if (!baseRepo.documents.has(id)) return;
                    const base = baseRepo.getDocument(id);
                    // Only merge dynamic pieces
                    base.testLogs = (doc.testLogs || []).map(l => (l instanceof DOSSIERS.TestLogEntry ? l : new DOSSIERS.TestLogEntry(l)));
                    base.incidentReports = (doc.incidentReports || []).map(r => (r instanceof DOSSIERS.IncidentReport ? r : new DOSSIERS.IncidentReport(r)));
                });
            } catch (e) {
                console.warn('Failed merging dynamic dossier entries:', e);
            }
        }

        function getActiveScDUser() {
            return new DOSSIERS.ScDUser({
                name: activeRole.name,
                clearanceLevel: activeRole.clearance,
                department: activeRole.department
            });
        }

        function renderFormattedText(text) {
            if (!text) return '';
            const normalized = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            if (markdownRenderer) {
                return markdownRenderer.render(normalized);
            }
            const escaped = normalized
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
            return escaped.replace(/\n/g, '<br>');
        }

        function showMessage(text, type = 'info') {
            toast(text, type === 'error' ? 'error' : 'success');
        }

        function saveRepository() {
            repository.saveToLocalStorage(STORAGE_KEY);
            saveRepositorySupabase();
        }

        function populateScpFilterOptions() {
            const sel = document.getElementById('log-scp-filter');
            if (!sel) return;
            // Keep first option
            while (sel.options.length > 1) sel.remove(1);
            repository.listDocuments()
                .map(d => d.designation)
                .sort()
                .forEach(id => {
                    const opt = document.createElement('option');
                    opt.value = id;
                    opt.textContent = id;
                    sel.appendChild(opt);
                });
        }

        function buildSearchIndex() {
            const entries = [];
            repository.listDocuments().forEach(doc => {
                const scpId = doc.designation;
                (doc.testLogs || []).forEach(log => {
                    const author = log.author || (Array.isArray(log.personnel) ? log.personnel.join(', ') : '') || 'UNKNOWN';
                    const content = log.content || '';
                    entries.push({
                        kind: 'TEST_LOG',
                        scpId,
                        id: log.testId,
                        timestamp: log.timestamp || log.createdAt || '',
                        text: `${scpId} ${author} ${content} ${log.procedure || ''} ${log.result || ''}`.toLowerCase(),
                        display: { author, content: content || `${log.procedure || ''}\n${log.result || ''}` }
                    });
                });
                (doc.incidentReports || []).forEach(rep => {
                    const units = rep.involvedUnits || rep.units || [];
                    const summary = rep.summary || '';
                    const text = `${scpId} ${summary} ${(rep.cause || '')} ${(rep.resolution || '')} ${(rep.preventionMeasures || rep.preventionNotes || '')} ${Array.isArray(units) ? units.join(' ') : ''}`.toLowerCase();
                    entries.push({
                        kind: 'INCIDENT_REPORT',
                        scpId,
                        id: rep.reportId,
                        timestamp: rep.timestamp || rep.createdAt || rep.date || '',
                        text,
                        display: { units, summary, cause: rep.cause || '', resolution: rep.resolution || '', prevention: rep.preventionMeasures || rep.preventionNotes || '' }
                    });
                });
            });
            return entries;
        }

        function renderSearchResults() {
            const box = document.getElementById('search-results');
            if (!box) return;
            const q = (document.getElementById('log-search')?.value || '').trim().toLowerCase();
            const scpFilter = document.getElementById('log-scp-filter')?.value || 'ALL';
            if (!q && (scpFilter === 'ALL' || !scpFilter)) {
                box.style.display = 'none';
                clearElement(box);
                return;
            }
            const idx = buildSearchIndex();
            const results = idx.filter(e => {
                if (scpFilter !== 'ALL' && e.scpId !== scpFilter) return false;
                if (!q) return true;
                return e.text.includes(q);
            }).slice(0, 50);

            clearElement(box);
            box.style.display = 'block';
            const hdr = createSafeElement('div', `MATCHES: ${results.length}${results.length >= 50 ? '+' : ''}`);
            hdr.style.color = 'var(--text-dim)';
            hdr.style.fontSize = '0.72rem';
            hdr.style.letterSpacing = '1px';
            hdr.style.marginBottom = '10px';
            box.appendChild(hdr);

            if (results.length === 0) {
                const none = createSafeElement('div', 'NO MATCHES FOUND');
                none.style.color = 'var(--text-dim)';
                box.appendChild(none);
                return;
            }

            results.forEach(r => {
                const card = document.createElement('div');
                card.style.border = '1px solid rgba(0,255,65,0.12)';
                card.style.background = 'rgba(0,15,3,0.25)';
                card.style.padding = '10px 12px';
                card.style.marginBottom = '8px';
                card.style.cursor = 'pointer';
                card.addEventListener('click', () => selectDocument(r.scpId));

                const top = createSafeElement('div', `${r.scpId} // ${r.kind} // ${r.id}`);
                top.style.fontFamily = 'var(--font-display)';
                top.style.letterSpacing = '2px';
                top.style.fontSize = '0.95rem';
                card.appendChild(top);

                const ts = createSafeElement('div', r.timestamp ? `TS: ${String(r.timestamp).slice(0, 19).replace('T', ' ')}` : '');
                ts.style.color = 'var(--text-dim)';
                ts.style.fontSize = '0.68rem';
                ts.style.marginTop = '2px';
                card.appendChild(ts);

                const body = document.createElement('div');
                body.className = 'formatted-text';
                body.style.marginTop = '8px';
                if (r.kind === 'TEST_LOG') {
                    body.innerHTML = renderFormattedText(r.display.content || '');
                } else {
                    const parts = [];
                    if (r.display.summary) parts.push(`**Summary:** ${r.display.summary}`);
                    if (Array.isArray(r.display.units) && r.display.units.length) parts.push(`**Units:** ${r.display.units.join(', ')}`);
                    if (r.display.cause) parts.push(`**Cause:** ${r.display.cause}`);
                    if (r.display.resolution) parts.push(`**Resolution:** ${r.display.resolution}`);
                    if (r.display.prevention) parts.push(`**Prevention:** ${r.display.prevention}`);
                    body.innerHTML = renderFormattedText(parts.join('\n\n'));
                }
                card.appendChild(body);

                box.appendChild(card);
            });
        }

        async function saveRepositorySupabase() {
            if (typeof _supabase === 'undefined') return;
            try {
                await repository.saveToSupabase();
            } catch (error) {
                const message = (error && (error.message || error.details || error.msg || JSON.stringify(error))) || 'Unknown Supabase error';
                console.warn('Failed to sync DOSSIERS to Supabase:', error);
                toast(`WARNING: DOSSIERS SAVE NOT SYNCED TO SERVER — ${message}`, 'warning');
            }
        }

        function renderObjectClassOptions(selectId, selectedValue) {
            const select = document.getElementById(selectId);
            // Static list (no user input) — build safely anyway
            clearElement(select);
            DOSSIERS.OBJECT_CLASSES.forEach(cls => {
                const opt = document.createElement('option');
                opt.value = cls;
                opt.textContent = cls;
                if (cls === selectedValue) opt.selected = true;
                select.appendChild(opt);
            });
        }

        function getDossierFilterValues() {
            const search = document.getElementById('dossier-search').value.trim().toLowerCase();
            const status = document.getElementById('filter-status').value;
            const objectClass = document.getElementById('filter-class').value;
            const minClearance = document.getElementById('filter-clearance').value;
            return {
                search,
                status,
                objectClass,
                minClearance: minClearance === '' ? null : parseInt(minClearance, 10)
            };
        }

        function matchesDossierFilters(dossier, filters) {
            if (filters.status && dossier.status !== filters.status) return false;
            if (filters.objectClass && dossier.objectClass !== filters.objectClass) return false;
            if (filters.minClearance !== null && dossier.clearanceLevel < filters.minClearance) return false;
            if (!filters.search) return true;
            return [dossier.designation, dossier.author, dossier.objectClass, dossier.description].some(field =>
                field && field.toLowerCase().includes(filters.search)
            );
        }

        function renderDossierList() {
            const container = document.getElementById('dossier-list');
            const filters = getDossierFilterValues();
            const documents = repository.listDocuments().filter(doc => matchesDossierFilters(doc, filters));
            if (!documents.length) {
                clearElement(container);
                const msg = createSafeElement('div', 'No dossiers match the current search and filters.');
                msg.style.color = 'var(--text-dim)';
                container.appendChild(msg);
                return;
            }
            clearElement(container);
            documents.forEach(doc => {
                const active = selectedDesignation === doc.designation;

                const card = document.createElement('div');
                card.style.border = '1px solid rgba(255,255,255,0.08)';
                card.style.padding = '18px';
                card.style.borderRadius = '12px';
                card.style.display = 'grid';
                card.style.gap = '10px';
                if (active) {
                    card.style.background = 'rgba(0,255,65,0.06)';
                    card.style.borderColor = 'rgba(0,255,65,0.25)';
                }

                const top = document.createElement('div');
                top.style.display = 'flex';
                top.style.justifyContent = 'space-between';
                top.style.flexWrap = 'wrap';
                top.style.gap = '12px';
                top.style.alignItems = 'flex-start';

                const left = document.createElement('div');
                left.style.minWidth = '220px';
                left.appendChild(createSafeElement('div', `${doc.designation} — ${doc.objectClass} — CL${doc.clearanceLevel}`));
                left.firstChild.style.fontWeight = '700';
                const sub = createSafeElement('div', `${doc.status} — AUTHOR: ${doc.author}`);
                sub.style.color = 'var(--text-dim)';
                sub.style.marginTop = '4px';
                left.appendChild(sub);

                const actions = document.createElement('div');
                actions.style.display = 'flex';
                actions.style.gap = '8px';
                actions.style.flexWrap = 'wrap';
                actions.style.justifyContent = 'flex-end';

                const view = createSafeElement('button', 'VIEW', 'btn');
                view.addEventListener('click', () => selectDocument(doc.designation));
                const tests = createSafeElement('button', 'TESTS', 'btn');
                tests.addEventListener('click', () => prepareTestLog(doc.designation));
                const incidents = createSafeElement('button', 'INCIDENTS', 'btn');
                incidents.addEventListener('click', () => prepareIncidentReport(doc.designation));

                actions.appendChild(view);
                actions.appendChild(tests);
                actions.appendChild(incidents);

                top.appendChild(left);
                top.appendChild(actions);

                const preview = createSafeElement('div', doc.description ? doc.description.substring(0, 180) : 'No description available.');
                preview.style.color = 'var(--text-dim)';

                card.appendChild(top);
                card.appendChild(preview);
                container.appendChild(card);
            });
        }

        function toggleNewDossierSection() {
            // CRITICAL: SCP entries are hardcoded; creation is disabled.
            toast('ACCESS_DENIED: SCP ENTRIES ARE HARD-CODED', 'error');
        }

        function renderSelectedDocument() {
            if (!selectedDesignation) {
                document.getElementById('document-summary').style.display = 'none';
                return;
            }
            const dossier = repository.getDocument(selectedDesignation);
            const summary = dossier.summary();
            // SCP content is read-only; only logs/reports are writable.

            document.getElementById('document-summary').style.display = 'block';
            const host = document.getElementById('document-summary');
            clearElement(host);
            const grid = document.createElement('div');
            grid.style.display = 'grid';
            grid.style.gap = '10px';

            // Title (Level 1)
            const title = createSafeElement('div', `${summary.designation} DOSSIER`, 'scp-dossier-title');
            grid.appendChild(title);

            // Fields (top section)
            const meta = document.createElement('div');
            meta.className = 'document-meta';
            meta.style.display = 'grid';
            meta.style.marginBottom = '8px';

            function metaItem(label, value) {
                const wrap = document.createElement('div');
                wrap.className = 'meta-item';
                const lab = createSafeElement('span', label, 'meta-label');
                const val = createSafeElement('span', value, 'meta-value');
                wrap.appendChild(lab);
                wrap.appendChild(val);
                return wrap;
            }

            meta.appendChild(metaItem('ITEM #', summary.designation || '—'));
            meta.appendChild(metaItem('OBJECT CLASS', summary.objectClass || '—'));
            meta.appendChild(metaItem('CLEARANCE LEVEL', `CL${summary.clearanceLevel ?? 0}+`));
            meta.appendChild(metaItem('STATUS', (summary.status || '—').toUpperCase()));
            grid.appendChild(meta);

            function row(label, value) {
                const d = document.createElement('div');
                d.appendChild(createSafeElement('strong', label));
                appendText(d, ' ' + value);
                return d;
            }

            function addSection(titleText, htmlContent) {
                const h = createSafeElement('div', titleText, 'scp-section-title');
                grid.appendChild(h);
                const body = document.createElement('div');
                body.className = 'formatted-text';
                body.innerHTML = htmlContent;
                grid.appendChild(body);
            }

            // Sections (in strict order)
            addSection('Description', summary.description ? renderFormattedText(summary.description) : 'N/A');
            addSection('Special Containment Procedures', summary.containmentProcedures ? renderFormattedText(summary.containmentProcedures) : 'N/A');
            addSection('Recontainment Procedures', summary.recontainmentProcedures ? renderFormattedText(summary.recontainmentProcedures) : 'N/A');
            addSection('Testing Guidelines', summary.testingGuidelines ? renderFormattedText(summary.testingGuidelines) : 'N/A');

            const idx = createSafeElement('div', `Testing Logs: ${String(summary.testLogCount ?? 0)}  //  Incident Reports: ${String(summary.incidentReportCount ?? 0)}`);
            idx.style.color = 'var(--text-dim)';
            idx.style.fontSize = '0.72rem';
            idx.style.letterSpacing = '1px';
            grid.appendChild(idx);

            host.appendChild(grid);

            renderTestLogList(dossier);
            renderIncidentList(dossier);
        }

        function selectDocument(designation) {
            if (!designation) return;
            selectedDesignation = designation;
            resetEditState();
            renderSelectedDocument();
            renderDossierList();
            document.getElementById('document-summary').style.display = 'block';
        }

        function resetEditState() {
            editingTestLogId = null;
            editingIncidentId = null;
            document.getElementById('clear-test-edit').style.display = 'none';
            document.getElementById('clear-incident-edit').style.display = 'none';
            document.getElementById('test-personnel').value = '';
            document.getElementById('test-procedure').value = '';
            document.getElementById('test-result').value = '';
            document.getElementById('incident-date').value = '';
            document.getElementById('incident-units').value = '';
            document.getElementById('incident-cause').value = '';
            document.getElementById('incident-resolution').value = '';
            document.getElementById('incident-prevention').value = '';
            document.getElementById('edit-document-section').style.display = 'none';
        }

        function resetTestLogForm() {
            editingTestLogId = null;
            document.getElementById('clear-test-edit').style.display = 'none';
            document.getElementById('test-personnel').value = '';
            document.getElementById('test-procedure').value = '';
            document.getElementById('test-result').value = '';
        }

        function resetIncidentForm() {
            editingIncidentId = null;
            document.getElementById('clear-incident-edit').style.display = 'none';
            document.getElementById('incident-date').value = '';
            document.getElementById('incident-units').value = '';
            document.getElementById('incident-cause').value = '';
            document.getElementById('incident-resolution').value = '';
            document.getElementById('incident-prevention').value = '';
        }

        function createDossierEntry() {
            // CRITICAL: SCP entries are hardcoded; creation is disabled.
            showMessage('ACCESS_DENIED: SCP ENTRIES ARE HARD-CODED', 'error');
        }

        function approveSelectedDocument(designation) {
            // CRITICAL: SCP entries are hardcoded; approval flow is disabled.
            showMessage('ACCESS_DENIED: DOSSIER APPROVAL IS NOT EDITABLE', 'error');
        }

        function openEditDossier(designation) {
            // CRITICAL: SCP entries are hardcoded; editing dossier content is disabled.
            showMessage('ACCESS_DENIED: DOSSIER CONTENT IS READ-ONLY', 'error');
        }

        function prepareTestLog(designation) {
            if (designation) selectDocument(designation);
            document.getElementById('test-log-section').style.display = 'block';
            document.getElementById('incident-section').style.display = 'none';
            document.getElementById('edit-document-section').style.display = 'none';
            resetTestLogForm();
            renderSelectedDocument();
            document.getElementById('test-personnel').focus();
        }

        function prepareIncidentReport(designation) {
            if (designation) selectDocument(designation);
            document.getElementById('incident-section').style.display = 'block';
            document.getElementById('test-log-section').style.display = 'none';
            document.getElementById('edit-document-section').style.display = 'none';
            resetIncidentForm();
            renderSelectedDocument();
            document.getElementById('incident-date').focus();
        }

        function closeEditSection() {
            document.getElementById('edit-document-section').style.display = 'none';
        }

        function saveDocumentEdit() {
            showMessage('ACCESS_DENIED: DOSSIER CONTENT IS READ-ONLY', 'error');
        }

        function saveTestLog() {
            const personnel = document.getElementById('test-personnel').value.split(',').map(p => p.trim()).filter(Boolean);
            const procedure = document.getElementById('test-procedure').value.trim();
            const result = document.getElementById('test-result').value.trim();

            if (!personnel.length || !procedure || !result) {
                showMessage('DATA_MISSING: Complete all test log fields.', 'error');
                return;
            }

            try {
                if (editingTestLogId) {
                    repository.updateTestLog(getActiveScDUser(), selectedDesignation, editingTestLogId, { personnel, procedure, result });
                    showMessage('TEST_LOG_UPDATED.');
                } else {
                    repository.addTestLog(getActiveScDUser(), selectedDesignation, { personnel, procedure, result });
                    showMessage('TEST_LOG_CREATED.');
                }
                saveRepository();
                resetTestLogForm();
                renderSelectedDocument();
            } catch (error) {
                showMessage(error.message, 'error');
            }
        }

        function editTestLog(testId) {
            const dossier = repository.getDocument(selectedDesignation);
            const entry = dossier.testLogs.find(log => log.testId === testId);
            if (!entry) return;
            editingTestLogId = entry.testId;
            document.getElementById('test-personnel').value = entry.personnel.join(', ');
            document.getElementById('test-procedure').value = entry.procedure;
            document.getElementById('test-result').value = entry.result;
            document.getElementById('clear-test-edit').style.display = 'inline-block';
        }

        function deleteTestLog(testId) {
            try {
                repository.deleteTestLog(getActiveScDUser(), selectedDesignation, testId);
                saveRepository();
                renderSelectedDocument();
                showMessage('TEST_LOG_DELETED.');
            } catch (error) {
                showMessage(error.message, 'error');
            }
        }

        function saveIncidentReport() {
            const date = document.getElementById('incident-date').value;
            const units = document.getElementById('incident-units').value.split(',').map(u => u.trim()).filter(Boolean);
            const cause = document.getElementById('incident-cause').value.trim();
            const resolution = document.getElementById('incident-resolution').value.trim();
            const preventionNotes = document.getElementById('incident-prevention').value.trim();

            if (!date || !units.length || !cause || !resolution || !preventionNotes) {
                showMessage('DATA_MISSING: Complete all incident report fields.', 'error');
                return;
            }

            try {
                if (editingIncidentId) {
                    repository.updateIncidentReport(getActiveScDUser(), selectedDesignation, editingIncidentId, {
                        date, units, cause, resolution, preventionNotes
                    });
                    showMessage('INCIDENT_REPORT_UPDATED.');
                } else {
                    repository.addIncidentReport(getActiveScDUser(), selectedDesignation, {
                        date, units, cause, resolution, preventionNotes
                    });
                    showMessage('INCIDENT_REPORT_CREATED.');
                }
                saveRepository();
                resetIncidentForm();
                renderSelectedDocument();
            } catch (error) {
                showMessage(error.message, 'error');
            }
        }

        function editIncidentReport(reportId) {
            const dossier = repository.getDocument(selectedDesignation);
            const entry = dossier.incidentReports.find(report => report.reportId === reportId);
            if (!entry) return;
            editingIncidentId = entry.reportId;
            document.getElementById('incident-date').value = entry.date;
            document.getElementById('incident-units').value = entry.units.join(', ');
            document.getElementById('incident-cause').value = entry.cause;
            document.getElementById('incident-resolution').value = entry.resolution;
            document.getElementById('incident-prevention').value = entry.preventionNotes;
            document.getElementById('clear-incident-edit').style.display = 'inline-block';
        }

        function deleteIncidentReport(reportId) {
            try {
                repository.deleteIncidentReport(getActiveScDUser(), selectedDesignation, reportId);
                saveRepository();
                renderSelectedDocument();
                showMessage('INCIDENT_REPORT_DELETED.');
            } catch (error) {
                showMessage(error.message, 'error');
            }
        }

        function renderTestLogList(dossier) {
            const container = document.getElementById('test-log-list');
            if (!dossier.testLogs.length) {
                clearElement(container);
                const msg = createSafeElement('div', 'No test logs yet.');
                msg.style.color = 'var(--text-dim)';
                container.appendChild(msg);
                return;
            }
            const isEditAllowed = activeRole.clearance >= 4;
            clearElement(container);
            dossier.testLogs.forEach(log => {
                const card = document.createElement('div');
                card.style.border = '1px solid rgba(255,255,255,0.08)';
                card.style.padding = '12px';
                card.style.marginBottom = '10px';
                card.style.borderRadius = '8px';

                const head = document.createElement('div');
                head.appendChild(createSafeElement('strong', log.testId || 'TEST'));
                appendText(head, ' — ' + (Array.isArray(log.personnel) ? log.personnel.join(', ') : ''));
                card.appendChild(head);

                const proc = document.createElement('div');
                proc.style.marginTop = '6px';
                proc.appendChild(createSafeElement('strong', 'Procedure:'));
                appendText(proc, ' ' + (log.procedure || ''));
                card.appendChild(proc);

                const res = document.createElement('div');
                res.style.marginTop = '6px';
                res.appendChild(createSafeElement('strong', 'Result:'));
                appendText(res, ' ' + (log.result || ''));
                card.appendChild(res);

                const controls = document.createElement('div');
                controls.style.marginTop = '8px';
                controls.style.display = 'flex';
                controls.style.gap = '8px';
                if (isEditAllowed) {
                    const edit = createSafeElement('button', 'EDIT', 'btn');
                    edit.addEventListener('click', () => editTestLog(log.testId));
                    const del = createSafeElement('button', 'DELETE', 'btn');
                    del.addEventListener('click', () => deleteTestLog(log.testId));
                    controls.appendChild(edit);
                    controls.appendChild(del);
                }
                card.appendChild(controls);
                container.appendChild(card);
            });
        }

        function renderIncidentList(dossier) {
            const container = document.getElementById('incident-list');
            if (!dossier.incidentReports.length) {
                clearElement(container);
                const msg = createSafeElement('div', 'No incident reports yet.');
                msg.style.color = 'var(--text-dim)';
                container.appendChild(msg);
                return;
            }
            const isEditAllowed = activeRole.clearance >= 4;
            clearElement(container);
            dossier.incidentReports.forEach(report => {
                const card = document.createElement('div');
                card.style.border = '1px solid rgba(255,255,255,0.08)';
                card.style.padding = '12px';
                card.style.marginBottom = '10px';
                card.style.borderRadius = '8px';

                const head = document.createElement('div');
                head.appendChild(createSafeElement('strong', report.reportId || 'REPORT'));
                appendText(head, ' — ' + (report.date || ''));
                card.appendChild(head);

                const units = document.createElement('div');
                units.style.marginTop = '6px';
                units.appendChild(createSafeElement('strong', 'Units:'));
                appendText(units, ' ' + (Array.isArray(report.units) ? report.units.join(', ') : ''));
                card.appendChild(units);

                const cause = document.createElement('div');
                cause.style.marginTop = '6px';
                cause.appendChild(createSafeElement('strong', 'Cause:'));
                appendText(cause, ' ' + (report.cause || ''));
                card.appendChild(cause);

                const res = document.createElement('div');
                res.style.marginTop = '6px';
                res.appendChild(createSafeElement('strong', 'Resolution:'));
                appendText(res, ' ' + (report.resolution || ''));
                card.appendChild(res);

                const prev = document.createElement('div');
                prev.style.marginTop = '6px';
                prev.appendChild(createSafeElement('strong', 'Prevention Notes:'));
                appendText(prev, ' ' + (report.preventionNotes || ''));
                card.appendChild(prev);

                const controls = document.createElement('div');
                controls.style.marginTop = '8px';
                controls.style.display = 'flex';
                controls.style.gap = '8px';
                if (isEditAllowed) {
                    const edit = createSafeElement('button', 'EDIT', 'btn');
                    edit.addEventListener('click', () => editIncidentReport(report.reportId));
                    const del = createSafeElement('button', 'DELETE', 'btn');
                    del.addEventListener('click', () => deleteIncidentReport(report.reportId));
                    controls.appendChild(edit);
                    controls.appendChild(del);
                }
                card.appendChild(controls);
                container.appendChild(card);
            });
        }

        async function initializeDossiersPage() {
            const auth = await requireAuth();
            if (!auth) return;
            currentProfile = auth.profile;
            currentRoles = await fetchMyRoles();
            activeRole = getActiveRole(currentProfile, currentRoles);
            if (activeRole.department !== 'ScD') {
                toast('ACCESS_DENIED: ONLY ScD OR O5 PERSONNEL MAY ACCESS DOSSIERS', 'error');
                setTimeout(() => window.location.href = 'dashboard.html', 1200);
                return;
            }

            const access = document.getElementById('access-summary');
            clearElement(access);
            appendText(access, 'SIGNED IN AS ');
            access.appendChild(createSafeElement('strong', activeRole.name || 'UNKNOWN'));
            appendText(access, ` — ${activeRole.department || 'N/A'} — CL${activeRole.clearance ?? 0}`);
            document.getElementById('dossier-author').value = activeRole.name;
            if (activeRole.clearance < 4) {
                document.getElementById('dossier-cl4-warning').style.display = 'block';
            }

            // CRITICAL: SCP entries are hardcoded (read-only content)
            // Dynamic logs/reports are loaded (localStorage/Supabase) and merged.
            repository = buildRepositoryFromHardcoded();

            // Load dynamic store (best-effort)
            let dynamicRepo = null;
            let loadedDynamic = false;
            if (typeof _supabase !== 'undefined') {
                try {
                    dynamicRepo = await DOSSIERS.DossierRepository.loadFromSupabase();
                    loadedDynamic = true;
                } catch (error) {
                    console.warn('Failed to load dynamic DOSSIERS from Supabase:', error);
                }
            }
            if (!loadedDynamic) {
                try {
                    dynamicRepo = DOSSIERS.DossierRepository.loadFromLocalStorage(STORAGE_KEY);
                } catch (e) {
                    console.warn('Failed to load dynamic DOSSIERS from local storage:', e);
                }
            }
            if (dynamicRepo) mergeDynamicEntriesIntoBase(repository, dynamicRepo);

            // Hide any legacy create/edit UI blocks (creation is disabled)
            document.getElementById('new-dossier-section').style.display = 'none';
            document.getElementById('edit-document-section').style.display = 'none';
            document.getElementById('dossier-cl4-warning').style.display = 'none';

            document.getElementById('document-summary').style.display = 'none';
            document.getElementById('test-log-section').style.display = 'none';
            document.getElementById('incident-section').style.display = 'none';
            populateScpFilterOptions();
            renderDossierList();
        }

        window.onload = initializeDossiersPage;
    </script>
