<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCiPNET - Personnel File</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="alert.js"></script>
    <script src="toast.js"></script>
    <script src="modal.js"></script>
    <script src="nav.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="identity-block">
        <a href="dashboard.html" style="text-decoration:none;"><div class="logo">SCIPNET<span>SECURE INTRANET // SITE-19</span></div></a>
    </div>
    <nav class="main-nav" id="main-nav"></nav>

    <div class="page-content page-wrapper fade-in">
        <div class="page-title">PERSONNEL_FILE</div>
        <div class="page-subtitle" id="profile-subtitle">LOADING...</div>

        <!-- Identity Card -->
        <div class="card" style="margin-bottom:20px;display:flex;flex-wrap:wrap;gap:20px;align-items:flex-start;">
            <div style="flex:1;min-width:200px;">
                <div style="font-family:var(--font-display);font-size:1.6rem;letter-spacing:3px;margin-bottom:8px;" id="profile-name">---</div>
                <div id="profile-badge" style="margin-bottom:10px;"></div>
                <div style="font-size:0.72rem;color:var(--text-dim);letter-spacing:2px;" id="profile-status"></div>
            </div>
            <div style="display:flex;flex-direction:column;gap:8px;min-width:160px;">
                <div class="meta-item"><span class="meta-label">DEPARTMENT</span><span class="meta-value" id="profile-dept">---</span></div>
                <div class="meta-item"><span class="meta-label">CLEARANCE</span><span class="meta-value" id="profile-cl">---</span></div>
                <div class="meta-item"><span class="meta-label">STATUS</span><span class="meta-value" id="profile-approved">---</span></div>
            </div>
        </div>

        <!-- Bio -->
        <div class="section-header">PERSONNEL_BIO</div>
        <div style="max-width:700px;">
            <textarea id="bio-input" rows="4" placeholder="NO BIO ON RECORD. ENTER PERSONNEL BIOGRAPHY..."></textarea>
            <div class="btn-row">
                <button onclick="saveBio()">SAVE_BIO</button>
                <span style="color:var(--text-dim);font-size:0.72rem;letter-spacing:1px;">VISIBLE TO AUTHORIZED PERSONNEL</span>
            </div>
        </div>

        <!-- Password Change -->
        <div class="section-header" style="margin-top:32px;">CHANGE_CREDENTIALS</div>
        <div style="max-width:700px;">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;" id="pw-grid">
                <div>
                    <label>NEW CREDENTIALS</label>
                    <input type="password" id="new-password" placeholder="ENTER NEW PASSWORD..." autocomplete="new-password">
                </div>
                <div>
                    <label>CONFIRM CREDENTIALS</label>
                    <input type="password" id="confirm-password" placeholder="CONFIRM NEW PASSWORD..." autocomplete="new-password">
                </div>
            </div>
            <div class="btn-row" style="margin-top:4px;">
                <button onclick="changePassword()">UPDATE_CREDENTIALS</button>
                <span style="color:var(--text-dim);font-size:0.72rem;letter-spacing:1px;">MIN. 6 CHARACTERS REQUIRED</span>
            </div>
        </div>

        <!-- Authored Documents -->
        <div class="section-header" style="margin-top:32px;">AUTHORED_DOCUMENTS</div>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>DATE</th><th>DEPT</th><th>CL</th><th>TITLE</th><th>ACTION</th></tr></thead>
                <tbody id="authored-list"><tr><td colspan="5" style="color:var(--text-dim);padding:20px;">LOADING...</td></tr></tbody>
            </table>
        </div>

        <div style="margin-top:28px;">
            <button class="btn-red" onclick="confirmLogout()">[ TERMINATE_SESSION ]</button>
        </div>
    </div>

    <script>
        async function loadProfile() {
            const auth = await requireAuth();
            if (!auth) return;
            const { user, profile } = auth;

            document.getElementById('profile-name').innerText     = profile.full_name || 'REDACTED';
            document.getElementById('profile-subtitle').innerText = `PERSONNEL FILE // ${profile.full_name || 'UNKNOWN'}`;
            document.getElementById('profile-dept').innerText     = `[${profile.department || 'UNASSIGNED'}]`;
            document.getElementById('profile-cl').innerText       = `LEVEL_${profile.clearance_level}`;
            document.getElementById('profile-approved').innerText = profile.is_approved ? 'ACTIVE' : 'PENDING';
            document.getElementById('profile-approved').style.color = profile.is_approved ? 'var(--green)' : 'var(--gold)';

            const badge = document.getElementById('profile-badge');
            if (profile.is_terminal_admin)
                badge.innerHTML = `<span class="clearance-badge gold"><span class="status-dot" style="background:var(--gold);box-shadow:0 0 6px var(--gold);"></span>ROOT_SYSTEM_ACCESS</span>`;
            else if (profile.is_overseer)
                badge.innerHTML = `<span class="clearance-badge red"><span class="status-dot" style="background:var(--red);box-shadow:0 0 6px var(--red);"></span>O5_CHAIRMAN</span>`;
            else if (profile.is_admin)
                badge.innerHTML = `<span class="clearance-badge gold"><span class="status-dot" style="background:var(--gold);box-shadow:0 0 6px var(--gold);"></span>O5_COUNCIL</span>`;
            else
                badge.innerHTML = `<span class="clearance-badge"><span class="status-dot"></span>FOUNDATION_PERSONNEL</span>`;

            const statusParts = [];
            if (profile.is_terminal_admin) statusParts.push('TERMINAL_ADMIN');
            if (profile.is_overseer)       statusParts.push('O5_OVERSEER');
            if (profile.is_admin)          statusParts.push('O5_COUNCIL');
            document.getElementById('profile-status').innerText = statusParts.length > 0 ? statusParts.join(' // ') : 'STANDARD_PERSONNEL';

            document.getElementById('bio-input').value = profile.bio || '';
            loadAuthoredDocs(profile.full_name);
        }

        async function loadAuthoredDocs(fullName) {
            const list = document.getElementById('authored-list');
            const { data: docs, error } = await _supabase
                .from('articles').select('*').eq('author', fullName).order('created_at', { ascending: false });
            if (error || !docs || docs.length === 0) {
                list.innerHTML = `<tr><td colspan="5" style="color:var(--text-dim);padding:20px;">NO DOCUMENTS ON RECORD</td></tr>`;
                return;
            }
            const CL_COLORS = ['var(--text-dim)','#4ade80','#facc15','#fb923c','var(--red)','#a78bfa'];
            list.innerHTML = docs.map(d => {
                const cl = d.required_clearance ?? 0;
                return `<tr>
                    <td>${new Date(d.created_at).toLocaleDateString()}</td>
                    <td style="color:var(--text-dim)">[${d.department||'N/A'}]</td>
                    <td style="color:${CL_COLORS[Math.min(cl,5)]};font-family:var(--font-display);">L${cl}</td>
                    <td style="color:var(--green)">${d.title||'UNTITLED'}</td>
                    <td><div class="btn-row">
                        <button onclick="window.location.href='view.html?id=${d.id}'">OPEN</button>
                        <button class="btn-gold" onclick="window.location.href='edit.html?id=${d.id}'">EDIT</button>
                    </div></td>
                </tr>`;
            }).join('');
        }

        async function saveBio() {
            const bio = document.getElementById('bio-input').value.trim();
            const { data: { user } } = await _supabase.auth.getUser();
            const { error } = await _supabase.from('profiles').update({ bio }).eq('id', user.id);
            if (error) toast('BIO_UPDATE_FAILED: ' + error.message, 'error');
            else toast('BIO_UPDATED_SUCCESSFULLY', 'success');
        }

        async function changePassword() {
            const newPw      = document.getElementById('new-password').value;
            const confirmPw  = document.getElementById('confirm-password').value;

            if (!newPw || !confirmPw) { toast('BOTH FIELDS ARE REQUIRED', 'error'); return; }
            if (newPw.length < 6)     { toast('PASSWORD MUST BE AT LEAST 6 CHARACTERS', 'error'); return; }
            if (newPw !== confirmPw)  { toast('CREDENTIALS DO NOT MATCH', 'error'); return; }

            const confirmed = await showModal(
                'UPDATE YOUR LOGIN CREDENTIALS?\nYOU WILL REMAIN LOGGED IN.',
                { title: 'CONFIRM_CREDENTIAL_UPDATE', confirmText: 'UPDATE', cancelText: 'CANCEL' }
            );
            if (!confirmed) return;

            const { error } = await _supabase.auth.updateUser({ password: newPw });
            if (error) {
                toast('UPDATE_FAILED: ' + error.message, 'error');
            } else {
                toast('CREDENTIALS_UPDATED_SUCCESSFULLY', 'success');
                document.getElementById('new-password').value     = '';
                document.getElementById('confirm-password').value = '';
            }
        }

        async function confirmLogout() {
            const confirmed = await showModal(
                'TERMINATE YOUR CURRENT SESSION?',
                { title: 'CONFIRM_LOGOUT', confirmText: 'TERMINATE', cancelText: 'CANCEL', danger: true }
            );
            if (!confirmed) return;
            await _supabase.auth.signOut();
            window.location.href = 'index.html';
        }

        window.onload = loadProfile;
    </script>
</body>
</html>
