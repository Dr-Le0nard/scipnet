<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCiPNET - Personnel Directory</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="dom.js"></script>
    <script src="departments.js"></script>
    <script src="alert.js"></script>
    <script src="toast.js"></script>
    <script src="notifications.js"></script>
    <script src="modal.js"></script>
    <script src="nav.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .role-pill {
            display: inline-block;
            font-size: 0.65rem;
            letter-spacing: 1px;
            border: 1px solid var(--green-border);
            padding: 1px 7px;
            color: var(--text-dim);
            margin: 2px 2px 0 0;
        }
    </style>
</head>
<body>
    <div class="identity-block">
        <a href="dashboard.html" style="text-decoration:none;"><div class="logo">SCIPNET<span>SECURE INTRANET // SITE-19</span></div></a>
    </div>
    <nav class="main-nav" id="main-nav"></nav>

    <div class="page-content page-wrapper fade-in">
        <div class="page-title">PERSONNEL_DIRECTORY</div>
        <div class="page-subtitle" id="access-notice">FOUNDATION STAFF MANIFEST // LOADING...</div>

        <div class="filter-bar" style="flex-wrap:wrap;gap:8px;">
            <input type="text" id="personnelSearch" placeholder="SEARCH BY NAME..."
                onkeyup="filterPersonnel()" style="max-width:240px;margin-bottom:0;">
            <select id="personnelSort" onchange="filterPersonnel()" style="max-width:200px;margin-bottom:0;">
                <option value="cl_desc">CLEARANCE (HIGH TO LOW)</option>
                <option value="cl_asc">CLEARANCE (LOW TO HIGH)</option>
                <option value="name_asc">NAME (A TO Z)</option>
                <option value="name_desc">NAME (Z TO A)</option>
                <option value="dept_asc">DEPARTMENT (A TO Z)</option>
            </select>
            <select id="personnelFilter" onchange="filterPersonnel()" style="max-width:200px;margin-bottom:0;">
                <option value="ALL">ALL DEPARTMENTS</option>
            </select>
            <span id="personnel-count" style="color:var(--text-dim);font-size:0.72rem;letter-spacing:1px;white-space:nowrap;align-self:center;"></span>
        </div>

        <div class="grid" id="personnel-list">
            <div style="color:var(--text-dim);">RETRIEVING STAFF MANIFEST...</div>
        </div>
    </div>

    <script>
        let allStaff = [];
        let allRoles = {};

        async function loadPersonnel() {
            const auth = await requireAuth();
            if (!auth) return;
            const { profile } = auth;

            startPresence(profile);
            initNotificationListeners(profile);

            const isElevated = profile.is_admin || profile.is_overseer || profile.is_terminal_admin;
            const notice = document.getElementById('access-notice');
            if (!isElevated) {
                notice.innerText = `DISPLAYING PERSONNEL AT OR BELOW CLEARANCE LEVEL ${profile.clearance_level}`;
                notice.style.color = 'var(--gold)';
            } else {
                notice.innerText = 'ELEVATED ACCESS // DISPLAYING ALL FOUNDATION PERSONNEL';
            }

            const [staffRes, rolesRes] = await Promise.all([
                _supabase.from('profiles')
                    .select('id, full_name, clearance_level, department, bio, is_admin, is_overseer, is_terminal_admin')
                    .eq('is_banned', false)
                    .eq('is_approved', true)
                    .order('clearance_level', { ascending: false }),
                _supabase.from('profile_roles')
                    .select('profile_id, role_name, department, bio')
                    .eq('status', 'Approved')
            ]);

            if (staffRes.error) {
                const host = document.getElementById('personnel-list');
                clearElement(host);
                const msg = createSafeElement('div', 'ERROR: DATABASE_ACCESS_DENIED');
                msg.style.color = 'var(--red)';
                host.appendChild(msg);
                return;
            }

            allRoles = {};
            (rolesRes.data || []).forEach(r => {
                if (!allRoles[r.profile_id]) allRoles[r.profile_id] = [];
                allRoles[r.profile_id].push(r);
            });

            allStaff = staffRes.data;
            populateFilterDepts();
            filterPersonnel();
        }

        function populateFilterDepts() {
            const sel = document.getElementById('personnelFilter');
            const depts = [...new Set(allStaff.map(p => p.department).filter(Boolean))].sort();
            depts.forEach(d => {
                const opt = document.createElement('option');
                opt.value = d;
                opt.text = `[${getDeptShort(d)}]`;
                sel.appendChild(opt);
            });
        }

        function getClearanceDisplay(person) {
            if (person.is_terminal_admin) return { label: 'MASKUR',   color: 'var(--gold)' };
            if (person.is_overseer)       return { label: 'APOLLYON', color: 'var(--red)' };
            if (person.is_admin)          return { label: 'OMNI',     color: 'var(--gold)' };
            const CL_COLORS = ['var(--text-dim)','#4ade80','#facc15','#fb923c','var(--red)','#a78bfa','var(--gold)','var(--red)','var(--gold)'];
            const cl = person.clearance_level ?? 0;
            return { label: cl >= 6 ? ['OMNI','APOLLYON','MASKUR'][cl-6] : `L${cl}`, color: CL_COLORS[Math.min(cl, 8)] };
        }

        function filterPersonnel() {
            const q      = document.getElementById('personnelSearch').value.toLowerCase();
            const sort   = document.getElementById('personnelSort').value;
            const filter = document.getElementById('personnelFilter').value;

            let list = allStaff.filter(p => {
                const nameMatch = p.full_name.toLowerCase().includes(q);
                const deptMatch = filter === 'ALL' || p.department === filter;
                return nameMatch && deptMatch;
            });

            list.sort((a, b) => {
                if (sort === 'cl_desc')   return (b.clearance_level ?? 0) - (a.clearance_level ?? 0);
                if (sort === 'cl_asc')    return (a.clearance_level ?? 0) - (b.clearance_level ?? 0);
                if (sort === 'name_asc')  return a.full_name.localeCompare(b.full_name);
                if (sort === 'name_desc') return b.full_name.localeCompare(a.full_name);
                if (sort === 'dept_asc')  return (a.department||'').localeCompare(b.department||'');
                return 0;
            });

            document.getElementById('personnel-count').innerText =
                `${list.length} PERSONNEL`;
            renderList(list);
        }

        function renderList(list) {
            const div = document.getElementById('personnel-list');
            if (list.length === 0) {
                clearElement(div);
                const empty = createSafeElement('div', 'NO MATCHING PERSONNEL FOUND');
                empty.style.color = 'var(--text-dim)';
                div.appendChild(empty);
                return;
            }
            clearElement(div);
            list.forEach(p => {
                const cl = getClearanceDisplay(p);
                const secondaryRoles = allRoles[p.id] || [];

                const card = document.createElement('div');
                card.className = 'card';

                card.appendChild(createSafeElement('h3', p.full_name || 'UNKNOWN'));

                const line = document.createElement('p');
                line.style.marginBottom = '6px';

                const badge = createSafeElement('span', cl.label, 'clearance-badge');
                badge.style.fontSize = '0.72rem';
                badge.style.padding = '2px 8px';
                badge.style.color = cl.color;
                badge.style.borderColor = `${cl.color}40`;
                line.appendChild(badge);
                appendText(line, ' ');

                const dept = createSafeElement('span', `[${p.department || 'UNASSIGNED'}]`);
                dept.style.color = 'var(--text-dim)';
                dept.style.fontSize = '0.75rem';
                line.appendChild(dept);

                card.appendChild(line);

                if (secondaryRoles.length > 0) {
                    const wrap = document.createElement('div');
                    wrap.style.marginTop = '6px';
                    wrap.style.paddingTop = '6px';
                    wrap.style.borderTop = '1px solid rgba(0,255,65,0.07)';

                    const hdr = createSafeElement('div', 'ADDITIONAL ROLES');
                    hdr.style.fontSize = '0.65rem';
                    hdr.style.color = 'var(--text-dim)';
                    hdr.style.letterSpacing = '1px';
                    hdr.style.marginBottom = '4px';
                    wrap.appendChild(hdr);

                    secondaryRoles.forEach(r => {
                        const role = document.createElement('div');
                        role.style.borderLeft = '2px solid var(--green-border)';
                        role.style.padding = '4px 0 4px 10px';
                        role.style.marginTop = '6px';

                        const top = document.createElement('div');
                        top.style.fontSize = '0.75rem';
                        top.style.color = 'var(--text-mid)';

                        top.appendChild(createSafeElement('span', r.role_name || 'UNKNOWN'));
                        const deptSpan = createSafeElement('span', `[${r.department || 'N/A'}]`);
                        deptSpan.style.color = 'var(--text-dim)';
                        deptSpan.style.fontSize = '0.68rem';
                        deptSpan.style.marginLeft = '6px';
                        top.appendChild(deptSpan);

                        role.appendChild(top);

                        if (r.bio) {
                            const bio = createSafeElement('div', r.bio);
                            bio.style.fontSize = '0.72rem';
                            bio.style.color = 'var(--text-dim)';
                            bio.style.marginTop = '2px';
                            role.appendChild(bio);
                        }

                        wrap.appendChild(role);
                    });

                    card.appendChild(wrap);
                }

                const bio = createSafeElement('p', p.bio || 'NO BIO ON RECORD');
                bio.style.marginTop = '4px';
                bio.style.color = 'var(--text-dim)';
                bio.style.fontSize = '0.75rem';
                card.appendChild(bio);

                div.appendChild(card);
            });
        }

        window.onload = loadPersonnel;
    </script>
</body>
</html>
