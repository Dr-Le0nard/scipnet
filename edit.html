<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SCiPNET - Edit Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="alert.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="form-header">LOADING_DOCUMENT...</h1>
    <nav>
        <a href="archive.html">BACK_TO_ARCHIVE</a>
    </nav>

    <div class="input-container" style="display: flex; flex-direction: column; width: 100%; max-width: 800px;">
        <label>DOCUMENT_TITLE:</label>
        <input type="text" id="title" placeholder="ENTER_LOG_TITLE">

        <label>CLEARANCE_RESTRICTION:</label>
        <select id="clearance_level">
            <option value="0">LEVEL_0 (PUBLIC)</option>
            <option value="1">LEVEL_1 (RESTRICTED)</option>
            <option value="2">LEVEL_2 (CONFIDENTIAL)</option>
            <option value="3">LEVEL_3 (SECRET)</option>
            <option value="4">LEVEL_4 (TOP_SECRET)</option>
            <option value="5">LEVEL_5 (O5_ONLY)</option>
        </select>

        <label>DOCUMENT_CONTENT:</label>
        <textarea id="content" rows="15" placeholder="DOCUMENT CONTENT..."></textarea>

        <div style="display: flex; gap: 10px; margin-top: 25px;">
            <button onclick="saveDocument()" style="flex: 1;">SAVE_CHANGES</button>
            <button onclick="deleteDocument()" class="terminate-btn" style="flex: 1;">DELETE_DOCUMENT</button>
        </div>
    </div>

    <script>
        let currentProfile = null;
        let articleId = null;
        let originalAuthor = null;

        async function initEdit() {
            const auth = await requireAuth();
            if (!auth) return;

            currentProfile = auth.profile;

            const params = new URLSearchParams(window.location.search);
            articleId = params.get('id');

            if (!articleId) {
                document.getElementById('form-header').innerText = "ERROR: NO_DOCUMENT_ID";
                return;
            }

            // Fetch the article
            const { data: art, error } = await _supabase
                .from('articles')
                .select('*')
                .eq('id', articleId)
                .single();

            if (error || !art) {
                document.getElementById('form-header').innerText = "ERROR: DOCUMENT_NOT_FOUND";
                return;
            }

            // Check permissions — must be admin or the original author
            const isElevated = currentProfile.is_admin || currentProfile.is_overseer || currentProfile.is_terminal_admin;
            const isAuthor = art.author === currentProfile.full_name;

            if (!isElevated && !isAuthor) {
                alert("ACCESS_DENIED: INSUFFICIENT_PRIVILEGES");
                window.location.href = "archive.html";
                return;
            }

            originalAuthor = art.author;
            document.getElementById('form-header').innerText = `EDITING: ${art.title || 'UNTITLED'}`;
            document.getElementById('title').value = art.title || '';
            document.getElementById('clearance_level').value = art.required_clearance || 0;
            document.getElementById('content').value = art.content || '';
        }

        async function saveDocument() {
            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();
            const clearance = parseInt(document.getElementById('clearance_level').value);

            if (!title || !content) {
                alert("CRITICAL_ERROR: DATA_MISSING");
                return;
            }

            const { error } = await _supabase
                .from('articles')
                .update({ title, content, required_clearance: clearance })
                .eq('id', articleId);

            if (error) {
                alert("UPDATE_FAILED: " + error.message);
            } else {
                alert("DOCUMENT_UPDATED_SUCCESSFULLY");
                window.location.href = `view.html?id=${articleId}`;
            }
        }

        async function deleteDocument() {
            if (!confirm("WARNING: PERMANENTLY DELETE THIS DOCUMENT? THIS CANNOT BE UNDONE.")) return;

            const { error } = await _supabase
                .from('articles')
                .delete()
                .eq('id', articleId);

            if (error) {
                alert("DELETE_FAILED: " + error.message);
            } else {
                alert("DOCUMENT_PERMANENTLY_DELETED");
                window.location.href = "archive.html";
            }
        }

        window.onload = initEdit;
    </script>
</body>
</html>
